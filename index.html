<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Monitor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-top: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        .hidden { display: none; }
        .bar-fill { transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); min-height: 4px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-50 pb-28 text-gray-800 antialiased">

    <!-- HEADER -->
    <div class="bg-blue-900 p-6 text-white text-center shadow-lg sticky top-0 z-40">
        <h1 id="header-title" class="text-xl font-black uppercase italic tracking-tighter">UNOS PODATAKA 📝</h1>
        <p class="text-[10px] opacity-70 font-bold" id="current-date"></p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- EKRAN 1: UNOS -->
        <div id="tab-input" class="space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-200 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <label class="block text-[9px] font-black text-blue-600 uppercase">1.8.1 (VT Mreža)</label>
                        <input type="number" id="in-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none" placeholder="0">
                        <span id="eur-in-vt" class="text-[10px] font-black text-blue-400">0.00 €</span>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <label class="block text-[9px] font-black text-blue-400 uppercase">1.8.2 (NT Mreža)</label>
                        <input type="number" id="in-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none" placeholder="0">
                        <span id="eur-in-nt" class="text-[10px] font-black text-blue-300">0.00 €</span>
                    </div>
                    <div class="bg-green-50 p-3 rounded-2xl border border-green-100">
                        <label class="block text-[9px] font-black text-green-700 uppercase">2.8.1 (VT Izvoz)</label>
                        <input type="number" id="out-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none" placeholder="0">
                        <span id="eur-out-vt" class="text-[10px] font-black text-green-600">0.00 €</span>
                    </div>
                    <div class="bg-green-50 p-3 rounded-2xl border border-green-100">
                        <label class="block text-[9px] font-black text-green-500 uppercase">2.8.2 (NT Izvoz)</label>
                        <input type="number" id="out-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none" placeholder="0">
                        <span id="eur-out-nt" class="text-[10px] font-black text-green-400">0.00 €</span>
                    </div>
                </div>
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                    <label class="block text-[9px] font-black text-orange-600 uppercase italic text-center">Solar Inverter (kWh)</label>
                    <input type="number" id="sol-gen" oninput="liveCalc()" class="w-full bg-transparent font-black text-2xl outline-none text-orange-700 text-center" placeholder="0.0">
                </div>
                <button onclick="processData()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase italic tracking-widest active:scale-95 transition-all">Analiziraj i Spremi</button>
            </div>

            <!-- GRAFIKON -->
            <div id="chart-section" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="text-[10px] font-black text-gray-400 uppercase text-center mb-8 italic underline">Usporedba kWh</h3>
                <div class="flex items-end justify-between h-40 px-2 border-b-2 border-gray-100 mb-4">
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-1" class="bar-fill w-full bg-blue-600 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">1.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-2" class="bar-fill w-full bg-blue-400 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">1.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-3" class="bar-fill w-full bg-green-600 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">2.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-4" class="bar-fill w-full bg-green-400 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">2.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-5" class="bar-fill w-full bg-orange-500 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2 italic text-orange-600 uppercase">SOL</span></div>
                </div>
                <div id="final-summary" class="text-center text-xl font-black italic"></div>
            </div>
        </div>

        <!-- EKRAN 2: ARHIVA -->
        <div id="tab-archive" class="hidden space-y-3 pb-10">
            <div class="flex justify-between items-center px-2 mb-2">
                <button onclick="exportToCloud()" class="bg-blue-100 text-blue-600 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-wider">☁️ iCloud Export</button>
                <button onclick="deleteSelected()" id="del-btn" class="hidden bg-red-100 text-red-600 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-wider">Obriši označeno</button>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- EKRAN 3: POSTAVKE -->
        <div id="tab-settings" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm">
                <h2 class="font-black text-gray-700 uppercase text-xs border-b pb-2 mb-6 italic">Postavke Tarifa (€/kWh)</h2>
                <div class="space-y-5">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-500 uppercase">VT Kupnja (1.8.1)</label>
                        <input type="number" id="p-vt" step="0.001" class="border-b-2 border-blue-200 w-24 text-right font-black p-1 outline-none text-blue-600" value="0.16">
                    </div>
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-500 uppercase">NT Kupnja (1.8.2)</label>
                        <input type="number" id="p-nt" step="0.001" class="border-b-2 border-blue-200 w-24 text-right font-black p-1 outline-none text-blue-400" value="0.08">
                    </div>
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-green-600 uppercase">Otkup viška (2.8.x)</label>
                        <input type="number" id="p-out" step="0.001" class="border-b-2 border-green-200 w-24 text-right font-black p-1 outline-none text-green-600" value="0.07">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black mt-8 uppercase tracking-widest shadow-xl">Spremi cijene</button>
            </div>
        </div>
    </div>

    <!-- DONJA NAVIGACIJA -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around text-[10px] font-black text-gray-400 z-50 shadow-2xl safe-area-inset-bottom">
        <button onclick="showTab('input')" id="btn-input" class="flex-1 py-5 active-tab uppercase text-blue-600">Unos</button>
        <button onclick="showTab('archive')" id="btn-archive" class="flex-1 py-5 uppercase">Arhiva</button>
        <button onclick="showTab('settings')" id="btn-settings" class="flex-1 py-5 uppercase">Postavke</button>
    </nav>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('hr-HR', { weekday: 'long', day: 'numeric', month: 'long' });

        window.onload = () => {
            if(localStorage.getItem('p_vt')) {
                document.getElementById('p-vt').value = localStorage.getItem('p_vt');
                document.getElementById('p-nt').value = localStorage.getItem('p_nt');
                document.getElementById('p-out').value = localStorage.getItem('p_out');
            }
            liveCalc();
        };

        function showTab(tab) {
            ['input', 'archive', 'settings'].forEach(t => {
                document.getElementById('tab-'+t).classList.add('hidden');
                document.getElementById('btn-'+t).classList.remove('active-tab', 'text-blue-600');
            });
            document.getElementById('tab-'+tab).classList.remove('hidden');
            document.getElementById('btn-'+tab).classList.add('active-tab', 'text-blue-600');
            
            const titles = { 'input': 'UNOS PODATAKA 📝', 'archive': 'ARHIVA UNOSA 📁', 'settings': 'POSTAVKE CIJENA ⚙️' };
            document.getElementById('header-title').innerText = titles[tab];

            if(tab === 'archive') renderArchive();
        }

        function liveCalc() {
            const pvt = parseFloat(document.getElementById('p-vt').value) || 0;
            const pnt = parseFloat(document.getElementById('p-nt').value) || 0;
            const pout = parseFloat(document.getElementById('p-out').value) || 0;

            document.getElementById('eur-in-vt').innerText = ((parseFloat(document.getElementById('in-vt').value) || 0) * pvt).toFixed(2) + " €";
            document.getElementById('eur-in-nt').innerText = ((parseFloat(document.getElementById('in-nt').value) || 0) * pnt).toFixed(2) + " €";
            document.getElementById('eur-out-vt').innerText = ((parseFloat(document.getElementById('out-vt').value) || 0) * pout).toFixed(2) + " €";
            document.getElementById('eur-out-nt').innerText = ((parseFloat(document.getElementById('out-nt').value) || 0) * pout).toFixed(2) + " €";
        }

        function processData() {
            const v1 = parseFloat(document.getElementById('in-vt').value) || 0;
            const v2 = parseFloat(document.getElementById('in-nt').value) || 0;
            const v3 = parseFloat(document.getElementById('out-vt').value) || 0;
            const v4 = parseFloat(document.getElementById('out-nt').value) || 0;
            const v5 = parseFloat(document.getElementById('sol-gen').value) || 0;

            const pvt = parseFloat(document.getElementById('p-vt').value);
            const pnt = parseFloat(document.getElementById('p-nt').value);
            const pout = parseFloat(document.getElementById('p-out').value);

            const balance = (v1 * pvt + v2 * pnt) - ((v3 + v4) * pout);

            document.getElementById('chart-section').classList.remove('hidden');
            const vals = [v1, v2, v3, v4, v5];
            const max = Math.max(...vals, 1);
            
            setTimeout(() => {
                vals.forEach((v, i) => {
                    document.getElementById(`bar-${i+1}`).style.height = (v / max * 100) + "%";
                });
                const summ = document.getElementById('final-summary');
                summ.innerText = "Dnevni saldo: " + balance.toFixed(2) + " €";
                summ.className = "text-center text-xl font-black italic mt-4 " + (balance > 0 ? "text-red-500" : "text-green-500");
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);

            let history = JSON.parse(localStorage.getItem('solar_history') || '[]');
            history.unshift({ 
                date: new Date().toLocaleDateString('hr-HR'), 
                val: balance.toFixed(2),
                kw: (v1+v2).toFixed(1)
            });
            localStorage.setItem('solar_history', JSON.stringify(history.slice(0, 50)));
        }

        function renderArchive() {
            const history = JSON.parse(localStorage.getItem('solar_history') || '[]');
            const list = document.getElementById('history-list');
            const delBtn = document.getElementById('del-btn');
            
            if(!history.length) {
                list.innerHTML = '<p class="text-center text-gray-400 py-20 font-black italic uppercase text-xs">Nema zapisa...</p>';
                delBtn.classList.add('hidden');
                return;
            }

            list.innerHTML = history.map((h, index) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-8 ${h.val > 0 ? 'border-red-500' : 'border-green-500'}">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" class="del-check w-5 h-5 rounded-md border-gray-300 text-blue-600 focus:ring-blue-500" data-index="${index}" onchange="toggleDelBtn()">
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">${h.date}</p>
                            <p class="text-xs font-black text-gray-600">${h.kw} kWh mreže</p>
                        </div>
                    </div>
                    <span class="font-black text-lg ${h.val > 0 ? 'text-red-500' : 'text-green-500'}">${h.val} €</span>
                </div>
            `).join('');
            toggleDelBtn();
        }

        function toggleDelBtn() {
            const anyChecked = document.querySelectorAll('.del-check:checked').length > 0;
            document.getElementById('del-btn').classList.toggle('hidden', !anyChecked);
        }

        function deleteSelected() {
            if(!confirm("Sigurno želiš obrisati odabrane unose?")) return;
            let history = JSON.parse(localStorage.getItem('solar_history') || '[]');
            const checkedBoxes = Array.from(document.querySelectorAll('.del-check:checked'))
                                      .map(cb => parseInt(cb.dataset.index));
            checkedBoxes.sort((a, b) => b - a).forEach(index => history.splice(index, 1));
            localStorage.setItem('solar_history', JSON.stringify(history));
            renderArchive();
        }

        function exportToCloud() {
            const history = localStorage.getItem('solar_history');
            if (!history) return alert("Nema podataka za izvoz.");
            const blob = new Blob([history], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Solar_Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function saveSettings() {
            localStorage.setItem('p_vt', document.getElementById('p-vt').value);
            localStorage.setItem('p_nt', document.getElementById('p-nt').value);
            localStorage.setItem('p_out', document.getElementById('p-out').value);
            alert("Postavke su spremljene! ✅");
            showTab('input');
        }
    </script>
</body>
</html>
