<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v29 - FINAL</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        /* Navigacija */
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .tab-content.active { display: block; }

        /* Unos Kartice */
        .weather-box { background: #1c1c1e; border: 1px solid var(--solar); padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 12px; border-bottom: 3px solid #444; }
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: block; }
        input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; outline: none; font-weight: bold; }
        .euro-hint { font-size: 0.7rem; color: var(--gray); border-top: 1px solid #333; margin-top: 5px; padding-top: 3px; display: block; }
        
        /* Grafika Unos */
        .live-graph { display: flex; align-items: flex-end; gap: 8px; height: 100px; background: #111; padding: 15px 10px; border-radius: 12px; border: 1px solid #333; margin-top: 15px; }
        .v-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 2px; position: relative; transition: height 0.3s; }
        .v-label { position: absolute; bottom: -18px; width: 100%; text-align: center; font-size: 0.5rem; color: var(--gray); font-weight: bold; }

        /* Arhiva - Jednoredni */
        .archive-line { display: flex; align-items: center; background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid var(--solar); overflow: hidden; }
        .arch-date { font-size: 0.75rem; font-weight: bold; min-width: 65px; color: var(--accent); }
        .arch-scroll-area { display: flex; gap: 12px; overflow-x: auto; flex: 1; padding: 0 10px; scrollbar-width: none; }
        .arch-scroll-area::-webkit-scrollbar { display: none; }
        .arch-data-block { display: flex; flex-direction: column; white-space: nowrap; }
        .arch-lbl { font-size: 0.55rem; color: var(--gray); text-transform: uppercase; }
        .arch-num { font-size: 0.75rem; font-weight: bold; }
        .arch-eur-small { font-size: 0.6rem; color: var(--gray); font-weight: normal; }
        .del-btn-mini { background: #333; color: var(--red); border: none; padding: 5px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; cursor: pointer; margin-left: 5px; }
        
        /* Statistika Elementi */
        .stat-filter { display: flex; gap: 5px; margin-bottom: 15px; }
        .f-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #1c1c1e; color: #fff; font-size: 0.7rem; cursor: pointer; }
        .f-btn.active { background: var(--accent); border-color: var(--accent); }
        
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .h-row { margin-bottom: 15px; }
        .h-label-row { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px; font-weight: bold; }
        .h-bar-bg { background: #111; height: 12px; border-radius: 6px; overflow: hidden; position: relative; }
        .h-bar-fill { height: 100%; transition: width 0.5s; }
        
        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="swTab('unos', this)">Unos</button>
        <button class="nav-btn" onclick="swTab('arhiva', this)">Arhiva</button>
        <button class="nav-btn" onclick="swTab('stat', this)">Statistika</button>
        <button class="nav-btn" onclick="swTab('postavke', this)">Postavke</button>
    </nav>

    <!-- UNOS -->
    <div id="unos" class="tab-content active">
        <div class="weather-box">☀️ <div class="w-text" style="color:var(--solar); font-weight:bold; margin-left:10px;">PETRINJA: SUNČANO. UKLJUČI TROŠILA!</div></div>
        <div class="card">
            <div class="input-row" style="grid-template-columns: 1fr;"><div class="input-box" style="border-color:var(--accent)"><label>Datum</label><input type="date" id="date"></div></div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz VT</label><input type="number" id="ivt" oninput="lUpd()"><span class="euro-hint" id="ivt_e">0.00 €</span></div>
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz NT</label><input type="number" id="int" oninput="lUpd()"><span class="euro-hint" id="int_e">0.00 €</span></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz VT</label><input type="number" id="evt" oninput="lUpd()"><span class="euro-hint" id="evt_e">0.00 €</span></div>
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz NT</label><input type="number" id="ent" oninput="lUpd()"><span class="euro-hint" id="ent_e">0.00 €</span></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--solar)"><label>Solari (kWh)</label><input type="number" id="prod" oninput="lUpd()"><span class="euro-hint" id="prod_e">0.00 €</span></div>
                <div class="input-box" style="border-color:#fff"><label>HEP (€)</label><input type="number" id="hep"></div>
            </div>
            <button class="main-btn" onclick="sData()">SPREMI UNOS</button>
        </div>
        <div class="live-graph">
            <div class="v-bar" id="b-ivt" style="background:var(--red)"><span class="v-label">U-VT</span></div>
            <div class="v-bar" id="b-int" style="background:var(--red); opacity:0.7"><span class="v-label">U-NT</span></div>
            <div class="v-bar" id="b-evt" style="background:var(--green)"><span class="v-label">X-VT</span></div>
            <div class="v-bar" id="b-ent" style="background:var(--green); opacity:0.7"><span class="v-label">X-NT</span></div>
            <div class="v-bar" id="b-prod" style="background:var(--solar)"><span class="v-label">SOLAR</span></div>
        </div>
    </div>

    <!-- ARHIVA -->
    <div id="arhiva" class="tab-content">
        <h3 style="margin-top:0">Arhiva unosa</h3>
        <div id="archiveList"></div>
    </div>

    <!-- STATISTIKA -->
    <div id="stat" class="tab-content">
        <div class="stat-filter">
            <button class="f-btn active" onclick="rStat('dan', this)">DAN</button>
            <button class="f-btn" onclick="rStat('mjesec', this)">MJESEC</button>
            <button class="f-btn" onclick="rStat('godina', this)">GODINA</button>
            <button class="f-btn" onclick="rStat('ukupno', this)">UKUPNO</button>
        </div>
        <div id="statOutput"></div>
    </div>

    <div id="postavke" class="tab-content"><h3>Postavke (Slijedi...)</h3></div>

<script>
    const K = 'SOLAR_DB_V29';
    let db = JSON.parse(localStorage.getItem(K)) || [];
    let cfg = { vt: 0.148, nt: 0.077, sell: 0.045 }; 

    document.getElementById('date').valueAsDate = new Date();

    function swTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'arhiva') rArch();
        if(id === 'stat') rStat('dan', document.querySelector('.f-btn'));
    }

    function lUpd() {
        const v = {
            ivt: parseFloat(document.getElementById('ivt').value) || 0,
            int: parseFloat(document.getElementById('int').value) || 0,
            evt: parseFloat(document.getElementById('evt').value) || 0,
            ent: parseFloat(document.getElementById('ent').value) || 0,
            prod: parseFloat(document.getElementById('prod').value) || 0
        };
        document.getElementById('ivt_e').innerText = (v.ivt * cfg.vt).toFixed(2) + " €";
        document.getElementById('int_e').innerText = (v.int * cfg.nt).toFixed(2) + " €";
        document.getElementById('evt_e').innerText = (v.evt * cfg.sell).toFixed(2) + " €";
        document.getElementById('ent_e').innerText = (v.ent * cfg.sell).toFixed(2) + " €";
        document.getElementById('prod_e').innerText = (v.prod * cfg.vt).toFixed(2) + " €";

        const max = Math.max(v.ivt, v.int, v.evt, v.ent, v.prod, 1);
        document.getElementById('b-ivt').style.height = (v.ivt/max*100) + "px";
        document.getElementById('b-int').style.height = (v.int/max*100) + "px";
        document.getElementById('b-evt').style.height = (v.evt/max*100) + "px";
        document.getElementById('b-ent').style.height = (v.ent/max*100) + "px";
        document.getElementById('b-prod').style.height = (v.prod/max*100) + "px";
    }

    function sData() {
        const entry = {
            id: Date.now(),
            date: document.getElementById('date').value,
            ivt: parseFloat(document.getElementById('ivt').value) || 0,
            int: parseFloat(document.getElementById('int').value) || 0,
            evt: parseFloat(document.getElementById('evt').value) || 0,
            ent: parseFloat(document.getElementById('ent').value) || 0,
            prod: parseFloat(document.getElementById('prod').value) || 0,
            hep: parseFloat(document.getElementById('hep').value) || 0
        };
        if(!entry.date) return alert("Unesi datum!");
        db.unshift(entry);
        localStorage.setItem(K, JSON.stringify(db));
        alert("Spremljeno!");
        ["ivt","int","evt","ent","prod","hep"].forEach(id => document.getElementById(id).value = "");
        lUpd();
    }

    function rArch() {
        const list = document.getElementById('archiveList');
        list.innerHTML = db.length === 0 ? "<p style='color:gray; text-align:center;'>Nema podataka.</p>" : ""; 
        db.forEach(item => {
            const div = document.createElement('div');
            div.className = 'archive-line';
            div.innerHTML = `
                <div class="arch-date">${item.date.split('-').reverse().slice(0,2).join('.')}</div>
                <div class="arch-scroll-area">
                    ${genBlock("U-VT", item.ivt, item.ivt*cfg.vt, "var(--red)")}
                    ${genBlock("U-NT", item.int, item.int*cfg.nt, "var(--red)")}
                    ${genBlock("X-VT", item.evt, item.evt*cfg.sell, "var(--green)")}
                    ${genBlock("X-NT", item.ent, item.ent*cfg.sell, "var(--green)")}
                    ${genBlock("SOLAR", item.prod, item.prod*cfg.vt, "var(--solar)")}
                    <div class="arch-data-block"><span class="arch-lbl">HEP</span><span class="arch-num">${item.hep}€</span></div>
                </div>
                <button class="del-btn-mini" onclick="obrisiUnos(${item.id})">X</button>
            `;
            list.appendChild(div);
        });
    }

    function genBlock(lbl, val, eur, col) {
        return `<div class="arch-data-block"><span class="arch-lbl">${lbl}</span><span class="arch-num" style="color:${col}">${val}<span class="arch-eur-small"> ${eur.toFixed(1)}€</span></span></div>`;
    }

    function obrisiUnos(id) {
        if(confirm("Obriši?")) {
            db = db.filter(i => i.id !== id);
            localStorage.setItem(K, JSON.stringify(db));
            rArch();
        }
    }

    // --- STATISTIKA LOGIKA S PODJELOM VT/NT ---
    function rStat(filter, btn) {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const now = new Date();
        const filtered = db.filter(d => {
            const dDate = new Date(d.date);
            if(filter === 'dan') return d.date === now.toISOString().split('T')[0];
            if(filter === 'mjesec') return dDate.getMonth() === now.getMonth() && dDate.getFullYear() === now.getFullYear();
            if(filter === 'godina') return dDate.getFullYear() === now.getFullYear();
            return true;
        });

        const sum = filtered.reduce((acc, curr) => {
            acc.ivt += curr.ivt; acc.int += curr.int;
            acc.evt += curr.evt; acc.ent += curr.ent;
            acc.prod += curr.prod; acc.hep += curr.hep;
            return acc;
        }, { ivt:0, int:0, evt:0, ent:0, prod:0, hep:0 });

        const maxVal = Math.max(sum.ivt, sum.int, sum.evt, sum.ent, sum.prod, 1);
        const out = document.getElementById('statOutput');
        
        out.innerHTML = `
            <div class="stat-card">
                <h4 style="margin:0 0 15px 0; color:var(--red); text-transform:uppercase;">UVOZ (Plaćate)</h4>
                ${genHBar("UVOZ VT", sum.ivt, maxVal, "var(--red)", sum.ivt * cfg.vt)}
                ${genHBar("UVOZ NT", sum.int, maxVal, "var(--red)", sum.int * cfg.nt, 0.6)}
                
                <h4 style="margin:20px 0 15px 0; color:var(--green); text-transform:uppercase;">IZVOZ (Dobivate)</h4>
                ${genHBar("IZVOZ VT", sum.evt, maxVal, "var(--green)", sum.evt * cfg.sell)}
                ${genHBar("IZVOZ NT", sum.ent, maxVal, "var(--green)", sum.ent * cfg.sell, 0.6)}
                
                <h4 style="margin:20px 0 15px 0; color:var(--solar); text-transform:uppercase;">SOLAR</h4>
                ${genHBar("PROIZVODNJA", sum.prod, maxVal, "var(--solar)", sum.prod * cfg.vt)}
            </div>
            <div class="stat-card">
                <h4 style="margin:0 0 15px 0; color:var(--accent); text-transform:uppercase;">Ukupne Vrijednosti</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-box" style="border-color:var(--red)"><label>Ukupni Uvoz</label><strong>${(sum.ivt*cfg.vt + sum.int*cfg.nt).toFixed(2)} €</strong></div>
                    <div class="input-box" style="border-color:var(--green)"><label>Ukupni Izvoz</label><strong>${(sum.evt*cfg.sell + sum.ent*cfg.sell).toFixed(2)} €</strong></div>
                    <div class="input-box" style="border-color:var(--solar)"><label>Ušteda</label><strong>${(sum.prod*cfg.vt).toFixed(2)} €</strong></div>
                    <div class="input-box" style="border-color:#fff"><label>HEP Račun</label><strong>${sum.hep.toFixed(2)} €</strong></div>
                </div>
            </div>
        `;
    }

    function genHBar(label, val, max, col, eur, op = 1) {
        const postotak = (val / max * 100).toFixed(1);
        return `
            <div class="h-row">
                <div class="h-label-row">
                    <span>${label}</span>
                    <span>${val.toFixed(1)} kWh <span style="color:var(--gray)">(${eur.toFixed(2)} €)</span></span>
                </div>
                <div class="h-bar-bg">
                    <div class="h-bar-fill" style="width:${postotak}%; background:${col}; opacity:${op}"></div>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
