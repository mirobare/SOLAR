<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Dark Monitor</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --solar: #ffcc00; --grid-in: #ff5252; --grid-out: #00e676; --accent: #bb86fc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        
        /* ROI & Stats */
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .roi-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .progress-bg { background: #333; height: 12px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--accent), var(--solar)); height: 100%; width: 0%; transition: 1.5s ease-out; }

        /* Weather Alert */
        .weather-alert { display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--solar); background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .rec-box { flex: 1; font-weight: bold; color: var(--solar); text-transform: uppercase; letter-spacing: 1px; }

        /* Grid Layout */
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
        input { background: #2c2c2c; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; }
        input:focus { border-color: var(--accent); outline: none; }
        
        button { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-hep { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 5px; }

        /* Table */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--accent); border-bottom: 2px solid #333; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .iskra { color: #888; font-size: 0.75rem; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--solar); text-align: center;">⚡ SOLAR DARK MONITOR</h2>

    <!-- ROI -->
    <div class="card">
        <div class="roi-header">
            <div><small>OTPLATA INVESTICIJE (10.700 €)</small><br><span id="roiPaid" style="font-size: 1.8rem; font-weight: bold;">0.00 €</span></div>
            <div style="text-align: right;"><small>PREOSTALO</small><br><span id="roiLeft">10700.00 €</span></div>
        </div>
        <div class="progress-bg"><div id="roiBar" class="progress-fill"></div></div>
    </div>

    <!-- VRIJEME -->
    <div class="weather-alert">
        <div style="font-size: 2.5rem;">☀️</div>
        <div class="rec-box" id="weatherRec">PETRINJA: SUNČANO. UKLJUČI PERILICU I KLIMU ODMAH!</div>
    </div>

    <!-- UNOS -->
    <div class="card">
        <div class="input-grid">
            <div class="group"><label>Datum</label><input type="date" id="date"></div>
            <div class="group"><label>Solari (kWh)</label><input type="number" id="prod" step="0.1"></div>
            <div class="group"><label><span class="iskra">1.8.1</span> Import VT</label><input type="number" id="impVT"></div>
            <div class="group"><label><span class="iskra">1.8.2</span> Import NT</label><input type="number" id="impNT"></div>
            <div class="group"><label><span class="iskra">2.8.1</span> Export VT</label><input type="number" id="expVT"></div>
            <div class="group"><label><span class="iskra">2.8.2</span> Export NT</label><input type="number" id="expNT"></div>
            <div class="group"><label>HEP RAČUN (€)</label><input type="number" id="hepBill" placeholder="Opcijski"></div>
        </div>
        <button onclick="saveData()" style="width: 100%;">SPREMI DNEVNI UNOS</button>
    </div>

    <!-- GRAFIKON -->
    <div class="card" style="height: 250px;"><canvas id="chart"></canvas></div>

    <!-- TABLICA -->
    <div class="card table-wrap">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Proizvedeno</th>
                    <th>Import (V/N)</th>
                    <th>Export (V/N)</th>
                    <th>Ušteda (€)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const INVESTICIJA = 10700;
    const C_VT = 0.14; 
    const C_NT = 0.07;
    let data = JSON.parse(localStorage.getItem('solarDarkDB')) || [];
    document.getElementById('date').valueAsDate = new Date();

    function saveData() {
        const entry = {
            date: document.getElementById('date').value,
            prod: parseFloat(document.getElementById('prod').value) || 0,
            impVT: parseFloat(document.getElementById('impVT').value) || 0,
            impNT: parseFloat(document.getElementById('impNT').value) || 0,
            expVT: parseFloat(document.getElementById('expVT').value) || 0,
            expNT: parseFloat(document.getElementById('expNT').value) || 0,
            hep: parseFloat(document.getElementById('hepBill').value) || 0
        };
        data.push(entry);
        localStorage.setItem('solarDarkDB', JSON.stringify(data));
        render();
    }

    function render() {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '';
        let totalSavings = 0;

        data.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(r => {
            const daySavings = (r.prod * C_VT); // Aproksimacija uštede
            totalSavings += daySavings;

            tbody.innerHTML += `
                <tr>
                    <td>${r.date}</td>
                    <td style="color:var(--solar)">${r.prod} kWh</td>
                    <td>${r.impVT} | ${r.impNT}</td>
                    <td style="color:var(--grid-out)">${r.expVT} | ${r.expNT}</td>
                    <td style="color:var(--accent)">${daySavings.toFixed(2)} €</td>
                </tr>`;
        });

        // Update ROI
        document.getElementById('roiPaid').innerText = totalSavings.toFixed(2) + " €";
        document.getElementById('roiLeft').innerText = (INVESTICIJA - totalSavings).toFixed(2) + " €";
        document.getElementById('roiBar').style.width = Math.min((totalSavings / INVESTICIJA * 100), 100) + "%";
        
        updateChart();
    }

    let myChart;
    function updateChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        const d = [...data].reverse();
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: d.map(x => x.date),
                datasets: [{
                    label: 'Proizvodnja',
                    data: d.map(x => x.prod),
                    borderColor: '#ffcc00',
                    tension: 0.3
                }, {
                    label: 'Export',
                    data: d.map(x => x.expVT + x.expNT),
                    borderColor: '#00e676',
                    tension: 0.3
                }]
            },
            options: { 
                maintainAspectRatio: false,
                scales: { y: { grid: { color: '#333' } }, x: { grid: { display: false } } },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    }

    render();
</script>
</body>
</html>
