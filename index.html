<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v29 - ANALIZA</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; position: relative; }
        
        /* GRAFIKON */
        .energy-bar-container { display: flex; height: 40px; background: #111; border-radius: 8px; overflow: hidden; margin: 10px 0; border: 1px solid #333; }
        .energy-segment { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: #000; transition: width 0.5s; position: relative; min-width: 20px; }
        
        .stat-legend { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; font-size: 0.65rem; }
        .leg-item { padding: 6px; border-radius: 6px; background: #2c2c2e; border-left: 3px solid transparent; }

        /* ANALIZA POVijest */
        .history-title { font-size: 0.8rem; color: var(--solar); font-weight: bold; margin: 25px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .saved-report { display: flex; justify-content: space-between; align-items: center; background: #1c1c1e; padding: 10px; border-radius: 8px; margin-bottom: 5px; border: 1px solid #333; font-size: 0.75rem; }
        
        button.main-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .save-btn { background: var(--green); color: #000; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="swTab('unos', this)">Unos</button>
        <button class="nav-btn" onclick="swTab('arhiva', this)">Arhiva</button>
        <button class="nav-btn" onclick="swTab('stat', this)">Analiza</button>
        <button class="nav-btn" onclick="swTab('postavke', this)">Postavke</button>
    </nav>

    <!-- UNOS -->
    <div id="unos" class="tab-content active">
        <div class="card">
            <label>Datum</label><input type="date" id="date" style="background:#2c2c2e; padding:10px; border-radius:8px; width:94%; color:#fff; border:none; margin-bottom:10px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="ivt" placeholder="Uvoz VT">
                <input type="number" id="int" placeholder="Uvoz NT">
                <input type="number" id="evt" placeholder="Izvoz VT">
                <input type="number" id="ent" placeholder="Izvoz NT">
                <input type="number" id="prod" placeholder="Solari kWh">
                <input type="number" id="hep" placeholder="Račun €">
            </div>
            <button class="main-btn" onclick="sData()">SPREMI PODATKE</button>
        </div>
    </div>

    <!-- ARHIVA -->
    <div id="arhiva" class="tab-content"><div id="archiveList"></div></div>

    <!-- ANALIZA / STATISTIKA -->
    <div id="stat" class="tab-content">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="nav-btn" style="border:1px solid #333; border-radius:8px;" onclick="rStat('dan')">DAN</button>
            <button class="nav-btn" style="border:1px solid #333; border-radius:8px;" onclick="rStat('mjesec')">MJESEC</button>
            <button class="nav-btn" style="border:1px solid #333; border-radius:8px;" onclick="rStat('godina')">GODINA</button>
        </div>

        <div id="statOutput"></div>
        
        <div class="history-title">Spremljene Analize</div>
        <div id="savedReportsList"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('solarDB')) || [];
        let savedReports = JSON.parse(localStorage.getItem('solarReports')) || [];
        document.getElementById('date').valueAsDate = new Date();

        function swTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'stat') { rStat('mjesec'); rSavedReports(); }
        }

        function sData() {
            const entry = {
                id: Date.now(),
                date: document.getElementById('date').value,
                ivt: parseFloat(document.getElementById('ivt').value) || 0,
                int: parseFloat(document.getElementById('int').value) || 0,
                evt: parseFloat(document.getElementById('evt').value) || 0,
                ent: parseFloat(document.getElementById('ent').value) || 0,
                prod: parseFloat(document.getElementById('prod').value) || 0,
                hep: parseFloat(document.getElementById('hep').value) || 0
            };
            db.push(entry);
            localStorage.setItem('solarDB', JSON.stringify(db));
            alert("Podaci upisani!");
        }

        function rStat(filter) {
            const now = new Date();
            const months = ["Siječanj", "Veljača", "Ožujak", "Travanj", "Svibanj", "Lipanj", "Srpanj", "Kolovoz", "Rujan", "Listopad", "Studeni", "Prosinac"];
            
            let filtered = db.filter(i => {
                const d = new Date(i.date);
                if(filter === 'dan') return d.toDateString() === now.toDateString();
                if(filter === 'mjesec') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if(filter === 'godina') return d.getFullYear() === now.getFullYear();
                return true;
            });

            const sum = filtered.reduce((a, c) => {
                a.ivt += c.ivt; a.int += c.int; a.evt += c.evt; a.ent += c.ent; a.prod += c.prod; a.hep += c.hep;
                return a;
            }, {ivt:0, int:0, evt:0, ent:0, prod:0, hep:0});

            let naslov = filter === 'mjesec' ? `${months[now.getMonth()]} ${now.getFullYear()}.` : `Analiza: ${filter}`;
            
            const total = sum.ivt + sum.int + sum.evt + sum.ent + sum.prod || 1;
            const out = document.getElementById('statOutput');
            out.innerHTML = `
                <div class="card">
                    <div style="font-weight:bold; color:var(--accent); margin-bottom:10px;">${naslov}</div>
                    <div class="energy-bar-container">
                        <div class="energy-segment" style="width:${(sum.ivt/total*100)}%; background:var(--red); color:#fff;">${sum.ivt.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.int/total*100)}%; background:var(--red); opacity:0.6; color:#fff;">${sum.int.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.evt/total*100)}%; background:var(--green);">${sum.evt.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.ent/total*100)}%; background:var(--green); opacity:0.6;">${sum.ent.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.prod/total*100)}%; background:var(--solar);">${sum.prod.toFixed(0)}</div>
                    </div>
                    <div class="stat-legend">
                        <div class="leg-item" style="border-color:var(--red)">U-VT: ${(sum.ivt*0.16).toFixed(1)}€</div>
                        <div class="leg-item" style="border-color:var(--green)">X-VT: ${(sum.evt*0.04).toFixed(1)}€</div>
                        <div class="leg-item" style="border-color:var(--solar)">SOLAR: ${sum.prod} kWh</div>
                        <div class="leg-item" style="border-color:var(--accent)">HEP: ${sum.hep}€</div>
                    </div>
                    <button class="save-btn" onclick="saveSnapshot('${naslov}', ${JSON.stringify(sum)})">SPREMI OVAJ PREGLED</button>
                </div>
            `;
        }

        function saveSnapshot(name, data) {
            savedReports.push({ id: Date.now(), name: name, data: data });
            localStorage.setItem('solarReports', JSON.stringify(savedReports));
            rSavedReports();
        }

        function rSavedReports() {
            const list = document.getElementById('savedReportsList');
            list.innerHTML = savedReports.map(r => `
                <div class="saved-report">
                    <span><b>${r.name}</b> (${r.data.prod} kWh)</span>
                    <button onclick="delReport(${r.id})" style="background:none; border:none; color:var(--red); font-weight:bold;">OBRIŠI</button>
                </div>
            `).join('');
        }

        function delReport(id) {
            savedReports = savedReports.filter(r => r.id !== id);
            localStorage.setItem('solarReports', JSON.stringify(savedReports));
            rSavedReports();
        }
    </script>
</body>
</html>
