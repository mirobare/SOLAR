<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v29 - FINAL</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .tab-content.active { display: block; }

        /* Unos */
        .weather-box { background: #1c1c1e; border: 1px solid var(--solar); padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 12px; border-bottom: 3px solid #444; }
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: block; }
        input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; outline: none; font-weight: bold; }
        .euro-hint { font-size: 0.7rem; color: var(--gray); border-top: 1px solid #333; margin-top: 5px; padding-top: 3px; display: block; }
        .live-graph { display: flex; align-items: flex-end; gap: 8px; height: 100px; background: #111; padding: 15px 10px; border-radius: 12px; border: 1px solid #333; margin-top: 15px; }
        .v-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 2px; position: relative; transition: height 0.3s; }
        .v-label { position: absolute; bottom: -18px; width: 100%; text-align: center; font-size: 0.5rem; color: var(--gray); font-weight: bold; }

        /* Arhiva - Jedan red LIJEVO */
        .archive-line { display: flex; align-items: center; background: var(--card); padding: 8px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid var(--solar); font-size: 0.7rem; text-align: left; }
        .archive-data { display: flex; gap: 8px; margin-left: 8px; flex: 1; overflow-x: auto; white-space: nowrap; }
        .e-tag { font-size: 0.55rem; opacity: 0.6; margin-left: 1px; color: #aaa; }

        /* Statistika */
        .stat-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2c2c2e; font-size: 0.85rem; }
        .val-s { color: var(--solar); font-weight: bold; }
        .val-u { color: var(--red); }
        .val-x { color: var(--green); }
        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="swTab('unos', this)">Unos</button>
        <button class="nav-btn" onclick="swTab('arhiva', this)">Arhiva</button>
        <button class="nav-btn" onclick="swTab('stat', this)">Statistika</button>
        <button class="nav-btn" onclick="swTab('postavke', this)">Postavke</button>
    </nav>

    <!-- UNOS -->
    <div id="unos" class="tab-content active">
        <div class="weather-box">☀️ <div class="w-text" style="color:var(--solar); font-weight:bold; margin-left:10px;">PETRINJA: SUNČANO. UKLJUČI TROŠILA!</div></div>
        <div class="card">
            <div class="input-row" style="grid-template-columns: 1fr;"><div class="input-box" style="border-color:var(--accent)"><label>Datum</label><input type="date" id="date"></div></div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz VT</label><input type="number" id="ivt" oninput="lUpd()"><span class="euro-hint" id="ivt_e">0.00 €</span></div>
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz NT</label><input type="number" id="int" oninput="lUpd()"><span class="euro-hint" id="int_e">0.00 €</span></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz VT</label><input type="number" id="evt" oninput="lUpd()"><span class="euro-hint" id="evt_e">0.00 €</span></div>
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz NT</label><input type="number" id="ent" oninput="lUpd()"><span class="euro-hint" id="ent_e">0.00 €</span></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--solar)"><label>Solari (kWh)</label><input type="number" id="prod" oninput="lUpd()"><span class="euro-hint" id="prod_e">0.00 €</span></div>
                <div class="input-box" style="border-color:#fff"><label>HEP (€)</label><input type="number" id="hep"></div>
            </div>
            <button class="main-btn" onclick="sData()">SPREMI UNOS</button>
        </div>
        <div class="live-graph">
            <div class="v-bar" id="b-ivt" style="background:var(--red)"><span class="v-label">U-VT</span></div>
            <div class="v-bar" id="b-int" style="background:var(--red); opacity:0.7"><span class="v-label">U-NT</span></div>
            <div class="v-bar" id="b-evt" style="background:var(--green)"><span class="v-label">X-VT</span></div>
            <div class="v-bar" id="b-ent" style="background:var(--green); opacity:0.7"><span class="v-label">X-NT</span></div>
            <div class="v-bar" id="b-prod" style="background:var(--solar)"><span class="v-label">SOLAR</span></div>
        </div>
    </div>

    <!-- ARHIVA -->
    <div id="arhiva" class="tab-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0">Arhiva</h3><button onclick="delSel()" style="background:var(--red); border:none; color:white; padding:5px 10px; border-radius:5px; font-size:0.7rem;">OBRIŠI</button>
        </div>
        <div id="archiveList"></div>
    </div>

    <!-- STATISTIKA -->
    <div id="stat" class="tab-content">
        <h3>Pregled po razdobljima</h3>
        <div class="card" id="statList"></div>
        <h3>Godišnji zbroj</h3>
        <div id="yearlyStats"></div>
    </div>

    <!-- POSTAVKE -->
    <div id="postavke" class="tab-content">
        <div class="card">
            <label>Cijena VT (€)</label><input type="number" id="cfgVT" step="0.001" value="0.14">
            <label>Cijena NT (€)</label><input type="number" id="cfgNT" step="0.001" value="0.07">
            <label>Otkup HEP (€)</label><input type="number" id="cfgSell" step="0.001" value="0.04">
            <button class="main-btn" onclick="sCfg()">SPREMI CIJENE</button>
        </div>
        <button style="background:#444; color:white; border:none; padding:12px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer;" onclick="exportXML()">📥 IZVEZI U .XML</button>
    </div>

<script>
    const K = 'SOLAR_DB_V29';
    let db = JSON.parse(localStorage.getItem(K)) || [];
    let cfg = JSON.parse(localStorage.getItem('SOLAR_CFG')) || { vt: 0.14, nt: 0.07, sell: 0.04 };

    function swTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'arhiva') rArch();
        if(id === 'stat') rStat();
    }

    function lUpd() {
        const v = { ivt: parseFloat(document.getElementById('ivt').value) || 0, int: parseFloat(document.getElementById('int').value) || 0, evt: parseFloat(document.getElementById('evt').value) || 0, ent: parseFloat(document.getElementById('ent').value) || 0, prod: parseFloat(document.getElementById('prod').value) || 0 };
        document.getElementById('ivt_e').innerText = (v.ivt * cfg.vt).toFixed(2) + " €";
        document.getElementById('int_e').innerText = (v.int * cfg.nt).toFixed(2) + " €";
        document.getElementById('prod_e').innerText = (v.prod * cfg.vt).toFixed(2) + " €";
        const max = Math.max(v.ivt, v.int, v.evt, v.ent, v.prod, 1);
        document.getElementById('b-ivt').style.height = (v.ivt / max * 100) + "%";
        document.getElementById('b-int').style.height = (v.int / max * 100) + "%";
        document.getElementById('b-evt').style.height = (v.evt / max * 100) + "%";
        document.getElementById('b-ent').style.height = (v.ent / max * 100) + "%";
        document.getElementById('b-prod').style.height = (v.prod / max * 100) + "%";
    }

    function sData() {
        const d = document.getElementById('date').value;
        if(!d) return alert("Datum!");
        const entry = { id: Date.now(), d: d, ivt: document.getElementById('ivt').value, int: document.getElementById('int').value, evt: document.getElementById('evt').value, ent: document.getElementById('ent').value, p: document.getElementById('prod').value, h: document.getElementById('hep').value };
        db.push(entry);
        localStorage.setItem(K, JSON.stringify(db));
        ['prod','ivt','int','evt','ent','hep'].forEach(id => document.getElementById(id).value = '');
        lUpd(); alert("Spremljeno!");
    }

    function rArch() {
        const list = document.getElementById('archiveList'); list.innerHTML = '';
        [...db].reverse().forEach(r => {
            const solar = parseFloat(r.p || 0);
            list.innerHTML += `<div class="archive-line"><input type="checkbox" class="cb" data-id="${r.id}"><strong style="margin:0 8px">${r.d.slice(5)}</strong><div class="archive-data"><span class="val-s">S:${solar}<span class="e-tag">${(solar*cfg.vt).toFixed(1)}€</span></span><span class="val-u">U:${r.ivt}|${r.int}</span><span class="val-x">X:${r.evt}|${r.ent}</span><span>H:${r.h}€</span></div></div>`;
        });
    }

    function rStat() {
        const today = new Date().toISOString().split('T')[0];
        const month = today.slice(0, 7);
        const year = today.slice(0, 4);
        let dP=0, mP=0, yP=0, tP=0, tH=0;
        let years = {};

        db.forEach(r => {
            const val = parseFloat(r.p || 0);
            const yr = r.d.slice(0,4);
            if(r.d === today) dP += val;
            if(r.d.startsWith(month)) mP += val;
            if(r.d.startsWith(year)) yP += val;
            tP += val; tH += parseFloat(r.h || 0);
            if(!years[yr]) years[yr] = { p: 0, h: 0 };
            years[yr].p += val; years[yr].h += parseFloat(r.h || 0);
        });

        document.getElementById('statList').innerHTML = `
            <div class="stat-row"><span>Danas:</span><span class="val-s">${dP.toFixed(1)} kWh</span></div>
            <div class="stat-row"><span>Ovaj mjesec:</span><span class="val-s">${mP.toFixed(1)} kWh</span></div>
            <div class="stat-row"><span>Ova godina:</span><span class="val-s">${yP.toFixed(1)} kWh</span></div>
            <div class="stat-row" style="border:none; font-weight:bold;"><span>UKUPNO:</span><span class="val-s">${tP.toFixed(0)} kWh | ${tH.toFixed(1)}€</span></div>`;
        
        let yH = '';
        Object.keys(years).sort().reverse().forEach(y => {
            yH += `<div class="card"><div class="stat-row"><b>Godina ${y}</b><span class="val-s">${years[y].p.toFixed(0)} kWh</span></div><div class="stat-row">Trošak HEP<span style="color:#fff">${years[y].h.toFixed(1)}€</span></div></div>`;
        });
        document.getElementById('yearlyStats').innerHTML = yH;
    }

    function delSel() {
        const ids = Array.from(document.querySelectorAll('.cb:checked')).map(c => parseInt(c.dataset.id));
        if(ids.length && confirm("Obriši?")) { db = db.filter(r => !ids.includes(r.id)); localStorage.setItem(K, JSON.stringify(db)); rArch(); }
    }

    function exportXML() {
        let xml = '<?xml version="1.0" encoding="UTF-8"?><SolarData>';
        db.forEach(r => xml += `<Entry><Datum>${r.d}</Datum><Solar>${r.p}</Solar><UvozVT>${r.ivt}</UvozVT><UvozNT>${r.int}</UvozNT><IzvozVT>${r.evt}</IzvozVT><IzvozNT>${r.ent}</IzvozNT><HEP>${r.h}</HEP></Entry>`);
        xml += '</SolarData>';
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([xml], {type:'text/xml'})); a.download='arhiva.xml'; a.click();
    }

    function sCfg() {
        cfg = { vt: parseFloat(document.getElementById('cfgVT').value), nt: parseFloat(document.getElementById('cfgNT').value), sell: parseFloat(document.getElementById('cfgSell').value) };
        localStorage.setItem('SOLAR_CFG', JSON.stringify(cfg)); alert("Spremljeno!");
    }

    document.getElementById('date').valueAsDate = new Date();
    document.getElementById('cfgVT').value = cfg.vt; document.getElementById('cfgNT').value = cfg.nt; document.getElementById('cfgSell').value = cfg.sell;
</script>
</body>
</html>
