<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v29 - FINAL</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .tab-content.active { display: block; }

        .weather-box { background: #1c1c1e; border: 1px solid var(--solar); padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; position: relative; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 12px; border-bottom: 3px solid #444; }
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: block; }
        input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; outline: none; font-weight: bold; }
        .euro-hint { font-size: 0.7rem; color: var(--gray); border-top: 1px solid #333; margin-top: 5px; padding-top: 3px; display: block; }
        
        .live-graph { display: flex; align-items: flex-end; gap: 8px; height: 100px; background: #111; padding: 15px 10px; border-radius: 12px; border: 1px solid #333; margin-top: 15px; }
        .v-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 2px; position: relative; transition: height 0.3s; }
        .v-label { position: absolute; bottom: -18px; width: 100%; text-align: center; font-size: 0.5rem; color: var(--gray); font-weight: bold; }

        .archive-line { display: flex; align-items: center; background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid var(--solar); overflow: hidden; }
        .arch-date { font-size: 0.75rem; font-weight: bold; min-width: 65px; color: var(--accent); }
        .arch-scroll-area { display: flex; gap: 12px; overflow-x: auto; flex: 1; padding: 0 10px; scrollbar-width: none; }
        .arch-scroll-area::-webkit-scrollbar { display: none; }
        .arch-data-block { display: flex; flex-direction: column; white-space: nowrap; }
        .arch-lbl { font-size: 0.55rem; color: var(--gray); text-transform: uppercase; }
        .arch-num { font-size: 0.75rem; font-weight: bold; }
        .del-btn-mini { background: #333; color: var(--red); border: none; padding: 5px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; cursor: pointer; }

        .stat-filter { display: flex; gap: 5px; margin-bottom: 15px; }
        .f-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #1c1c1e; color: #fff; font-size: 0.65rem; cursor: pointer; }
        .f-btn.active { background: var(--accent); border-color: var(--accent); }
        
        .h-row { margin-bottom: 10px; }
        .h-label-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 3px; font-weight: bold; }
        .h-bar-bg { background: #111; height: 12px; border-radius: 6px; overflow: hidden; }
        .h-bar-fill { height: 100%; transition: width 0.5s; }

        .stat-details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; font-size: 0.65rem; color: var(--gray); }
        .stat-details.active { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }

        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .exp-btn { background: #2c2c2e; color: var(--green); border: 1px solid var(--green); padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .det-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 0.6rem; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="swTab('unos', this)">Unos</button>
        <button class="nav-btn" onclick="swTab('arhiva', this)">Arhiva</button>
        <button class="nav-btn" onclick="swTab('stat', this)">Statistika</button>
        <button class="nav-btn" onclick="swTab('postavke', this)">Postavke</button>
    </nav>

    <div id="unos" class="tab-content active">
        <div class="weather-box">☀️ <div class="w-text" style="color:var(--solar); font-weight:bold; margin-left:10px;">PETRINJA: SUNČANO. UKLJUČI TROŠILA!</div></div>
        <div class="card">
            <div class="input-row" style="grid-template-columns: 1fr;"><div class="input-box" style="border-color:var(--accent)"><label>Datum</label><input type="date" id="date"></div></div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz VT</label><input type="number" id="ivt" oninput="lUpd()"><span class="euro-hint" id="ivt_e">0.00 €</span></div>
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz NT</label><input type="number" id="int" oninput="lUpd()"><span class="euro-hint" id="int_e">0.00 €</span></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz VT</label><input type="number" id="evt" oninput="lUpd()"><span class="euro-hint" id="evt_e">0.00 €</span></div>
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz NT</label><input type="number" id="ent" oninput="lUpd()"><span class="euro-hint" id="ent_e">0.00 €</span></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--solar)"><label>Solari (kWh)</label><input type="number" id="prod" oninput="lUpd()"><span class="euro-hint" id="prod_e">0.00 €</span></div>
                <div class="input-box" style="border-color:#fff"><label>HEP (€)</label><input type="number" id="hep"></div>
            </div>
            <button class="main-btn" onclick="sData()">SPREMI UNOS</button>
        </div>
        <div class="live-graph">
            <div class="v-bar" id="b-ivt" style="background:var(--red)"><span class="v-label">U-VT</span></div>
            <div class="v-bar" id="b-int" style="background:var(--red); opacity:0.7"><span class="v-label">U-NT</span></div>
            <div class="v-bar" id="b-evt" style="background:var(--green)"><span class="v-label">X-VT</span></div>
            <div class="v-bar" id="b-ent" style="background:var(--green); opacity:0.7"><span class="v-label">X-NT</span></div>
            <div class="v-bar" id="b-prod" style="background:var(--solar)"><span class="v-label">SOLAR</span></div>
        </div>
    </div>

    <div id="arhiva" class="tab-content"><div id="archiveList"></div></div>

    <div id="stat" class="tab-content">
        <div class="stat-filter">
            <button class="f-btn active" onclick="rStat('dan', this)">DANI</button>
            <button class="f-btn" onclick="rStat('mjesec', this)">MJESECI</button>
            <button class="f-btn" onclick="rStat('godina', this)">GODINE</button>
            <button class="f-btn" onclick="rStat('ukupno', this)">UKUPNO</button>
        </div>
        <div id="statOutput"></div>
    </div>

    <div id="postavke" class="tab-content">
        <div class="card">
            <h4 style="color:var(--accent); margin-top:0">POVRAT INVESTICIJE</h4>
            <div class="input-row">
                <div class="input-box"><label>Cijena elektrane (€)</label><input type="number" id="cfgInv" oninput="sCfg()"></div>
                <div class="input-box" style="background:#111; border-color:var(--green)"><label>Otplaćeno do sad</label><strong id="ROI_status" style="font-size:1.1rem">0.00 €</strong></div>
            </div>
            <p id="ROI_text" style="font-size:0.7rem; color:var(--gray); margin:0"></p>
        </div>
        <div class="card">
            <h4 style="color:var(--accent); margin-top:0">CIJENE ENERGIJE (€/kWh)</h4>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz VT</label><input type="number" id="cfgVT" step="0.001" oninput="sCfg()"></div>
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz NT</label><input type="number" id="cfgNT" step="0.001" oninput="sCfg()"></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--green)"><label>Otkup VT</label><input type="number" id="cfgXVT" step="0.001" oninput="sCfg()"></div>
                <div class="input-box" style="border-color:var(--green)"><label>Otkup NT</label><input type="number" id="cfgXNT" step="0.001" oninput="sCfg()"></div>
            </div>
            <button class="exp-btn" onclick="exportToExcel()">📊 IZVOZ U EXCEL (.CSV)</button>
        </div>
    </div>

<script>
    const K = 'SOLAR_DB_V29';
    let db = JSON.parse(localStorage.getItem(K)) || [];
    let cfg = JSON.parse(localStorage.getItem('SOLAR_CFG')) || { vt:0.15, nt:0.08, xvt:0.04, xnt:0.04, inv: 5000 };

    document.getElementById('date').valueAsDate = new Date();
    ['VT','NT','XVT','XNT','Inv'].forEach(f => {
        const el = document.getElementById('cfg'+f);
        if(el) el.value = cfg[f.toLowerCase()] || 0;
    });

    function swTab(id, btn) {
        document.querySelectorAll('.tab-content, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
        if(id === 'arhiva') rArch(); 
        if(id === 'stat') rStat('dan', document.querySelector('.f-btn')); 
        if(id === 'postavke') uROI();
    }

    function lUpd() {
        const val = id => parseFloat(document.getElementById(id).value) || 0;
        const v = { ivt: val('ivt'), int: val('int'), evt: val('evt'), ent: val('ent'), prod: val('prod') };
        document.getElementById('ivt_e').innerText = (v.ivt*(cfg.vt||0)).toFixed(2)+" €";
        document.getElementById('int_e').innerText = (v.int*(cfg.nt||0)).toFixed(2)+" €";
        document.getElementById('evt_e').innerText = (v.evt*(cfg.xvt||0)).toFixed(2)+" €";
        document.getElementById('ent_e').innerText = (v.ent*(cfg.xnt||0)).toFixed(2)+" €";
        document.getElementById('prod_e').innerText = (v.prod*(cfg.vt||0)).toFixed(2)+" €";
        const max = Math.max(v.ivt, v.int, v.evt, v.ent, v.prod, 1);
        ['ivt','int','evt','ent','prod'].forEach(id => document.getElementById('b-'+id).style.height = (v[id]/max*100) + "px");
    }

    function sData() {
        const e = { id:Date.now(), date:document.getElementById('date').value, ivt:parseFloat(document.getElementById('ivt').value)||0, int:parseFloat(document.getElementById('int').value)||0, evt:parseFloat(document.getElementById('evt').value)||0, ent:parseFloat(document.getElementById('ent').value)||0, prod:parseFloat(document.getElementById('prod').value)||0, hep:parseFloat(document.getElementById('hep').value)||0 };
        if(!e.date) return alert("Unesi datum!");
        db.unshift(e); db.sort((a,b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem(K, JSON.stringify(db)); alert("Spremljeno!");
        ["ivt","int","evt","ent","prod","hep"].forEach(id => document.getElementById(id).value = "");
        lUpd(); uROI();
    }

    function rArch() {
        const list = document.getElementById('archiveList'); list.innerHTML = db.length ? "" : "<p style='text-align:center;color:gray'>Nema podataka.</p>";
        db.forEach(item => {
            const div = document.createElement('div'); div.className = 'archive-line';
            div.innerHTML = `<div class="arch-date">${item.date.split('-').reverse().slice(0,2).join('.')}</div>
                <div class="arch-scroll-area">
                    ${genBlock("U-VT", item.ivt, item.ivt*(cfg.vt||0), "var(--red)")} ${genBlock("U-NT", item.int, item.int*(cfg.nt||0), "var(--red)")}
                    ${genBlock("X-VT", item.evt, item.evt*(cfg.xvt||0), "var(--green)")} ${genBlock("X-NT", item.ent, item.ent*(cfg.xnt||0), "var(--green)")}
                    ${genBlock("SOLAR", item.prod, item.prod*(cfg.vt||0), "var(--solar)")}
                </div><button class="del-btn-mini" onclick="obrisiUnos(${item.id})">X</button>`;
            list.appendChild(div);
        });
    }

    function genBlock(lbl, val, eur, col) { return `<div class="arch-data-block"><span class="arch-lbl">${lbl}</span><span class="arch-num" style="color:${col}">${val}<span style="font-size:0.6rem; opacity:0.7"> ${eur.toFixed(1)}€</span></span></div>`; }

    function sCfg() {
        ['VT','NT','XVT','XNT','Inv'].forEach(f => cfg[f.toLowerCase()] = parseFloat(document.getElementById('cfg'+f).value) || 0);
        localStorage.setItem('SOLAR_CFG', JSON.stringify(cfg)); uROI();
    }

    function uROI() {
        const totalUstedjeno = db.reduce((s, x) => s + (x.prod * (cfg.vt||0)) + (x.evt * (cfg.xvt||0)) + (x.ent * (cfg.xnt||0)), 0);
        const st = document.getElementById('ROI_status'); if(st) st.innerText = (totalUstedjeno || 0).toFixed(2) + " €";
        const txt = document.getElementById('ROI_text'); if(txt) {
            const preostalo = (cfg.inv || 0) - totalUstedjeno;
            txt.innerText = preostalo > 0 ? `Preostalo za otplatu: ${preostalo.toFixed(2)} €` : "Investicija se isplatila! 🎉";
        }
    }

    function rStat(filter, btn) {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        const out = document.getElementById('statOutput'); out.innerHTML = "";
        if (db.length === 0) { out.innerHTML = "<p style='text-align:center;color:gray'>Nema podataka.</p>"; return; }

        let groups = {};
        if (filter === 'ukupno') {
            groups['SVEUKUPNO'] = db.reduce((a, c) => ({ ivt:a.ivt+c.ivt, int:a.int+c.int, evt:a.evt+c.evt, ent:a.ent+c.ent, prod:a.prod+c.prod, days:[...a.days, c] }), {ivt:0,int:0,evt:0,ent:0,prod:0,days:[]});
        } else {
            db.forEach(d => {
                let key = d.date;
                if(filter === 'mjesec') key = d.date.slice(0,7);
                if(filter === 'godina') key = d.date.slice(0,4);
                if(!groups[key]) groups[key] = { ivt:0, int:0, evt:0, ent:0, prod:0, days: [] };
                groups[key].ivt += d.ivt; groups[key].int += d.int; groups[key].evt += d.evt; groups[key].ent += d.ent; groups[key].prod += d.prod;
                groups[key].days.push(d);
            });
        }

        Object.keys(groups).sort().reverse().forEach(key => {
            const s = groups[key];
            const max = Math.max(s.ivt, s.int, s.evt, s.ent, s.prod, 1);
            let displayTitle = key;
            if(filter === 'mjesec') {
                const parts = key.split('-');
                const imena = ["Sij", "Velj", "Ožu", "Tra", "Svi", "Lip", "Srp", "Kol", "Ruj", "Lis", "Stu", "Pro"];
                displayTitle = imena[parseInt(parts[1])-1] + " " + parts[0];
            }

            const card = document.createElement('div'); card.className = 'card';
            const detId = 'det-' + key.toString().replace(/[^a-zA-Z0-9]/g, "");
            card.innerHTML = `
                ${filter !== 'dan' ? `<button class="det-btn" onclick="document.getElementById('${detId}').classList.toggle('active')">DETALJI</button>` : ''}
                <h4 style="margin:0 0 15px 0; color:var(--accent); font-size:0.8rem;">${displayTitle}</h4>
                ${genHBar("UVOZ VT", s.ivt, max, "var(--red)", s.ivt*(cfg.vt||0))}
                ${genHBar("UVOZ NT", s.int, max, "var(--red)", s.int*(cfg.nt||0), 0.6)}
                ${genHBar("IZVOZ VT", s.evt, max, "var(--green)", s.evt*(cfg.xvt||0))}
                ${genHBar("IZVOZ NT", s.ent, max, "var(--green)", s.ent*(cfg.xnt||0), 0.6)}
                ${genHBar("SOLAR", s.prod, max, "var(--solar)", s.prod*(cfg.vt||0))}
                <div id="${detId}" class="stat-details">
                    <div style="font-weight:bold; margin-bottom:5px; color:#fff">Dani unutar razdoblja:</div>
                    ${s.days.map(d => `<div class="detail-row"><span>${d.date.split('-').reverse().slice(0,2).join('.')}</span><span style="color:var(--red)">U:${(d.ivt+d.int).toFixed(1)}</span><span style="color:var(--green)">X:${(d.evt+d.ent).toFixed(1)}</span><span style="color:var(--solar)">S:${d.prod.toFixed(1)}</span></div>`).join('')}
                </div>`;
            out.appendChild(card);
        });
    }

    function genHBar(lbl, val, max, col, eur, op=1) {
        return `<div class="h-row"><div class="h-label-row"><span>${lbl}</span><span style="color:${col}">${val.toFixed(1)} kWh <span style="font-size:0.7rem">(${eur.toFixed(2)} €)</span></span></div>
            <div class="h-bar-bg"><div class="h-bar-fill" style="width:${(val/max*100)}%; background:${col}; opacity:${op}"></div></div></div>`;
    }

    function obrisiUnos(id) { if(confirm("Obriši?")) { db = db.filter(i => i.id !== id); localStorage.setItem(K, JSON.stringify(db)); rArch(); uROI(); } }

    function exportToExcel() {
        if(db.length === 0) return alert("Nema podataka za izvoz.");
        let csv = "Datum,Uvoz VT,Uvoz NT,Izvoz VT,Izvoz NT,Solar kWh,HEP Euro\n";
        db.forEach(d => { csv += `${d.date},${d.ivt},${d.int},${d.evt},${d.ent},${d.prod},${d.hep}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `solar_pro_export_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
</body>
</html>
