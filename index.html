<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Monitor Ultra 10700</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* OSNOVNA CRNA TEMA */
        body { background-color: #000000 !important; color: #e5e7eb; }
        .active-tab { border-top: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        .hidden { display: none; }
        .bar-fill { transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); min-height: 4px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* PRILAGODBA KARTICA DA BUDU VIDLJIVE NA CRNOM */
        .bg-white { background-color: #111111 !important; border: 1px solid #222222 !important; }
        .text-gray-800 { color: #f3f4f6 !important; }
        .bg-blue-50 { background-color: rgba(37, 99, 235, 0.1) !important; border-color: rgba(37, 99, 235, 0.2) !important; }
        .bg-green-50 { background-color: rgba(34, 197, 94, 0.1) !important; border-color: rgba(34, 197, 94, 0.2) !important; }
        .bg-orange-50 { background-color: rgba(249, 115, 22, 0.1) !important; border-color: rgba(249, 115, 22, 0.2) !important; }
        
        /* NAVBAR FIX */
        nav { background-color: #000000 !important; border-top: 1px solid #1f2937 !important; }
    </style>
</head>
<body class="pb-28 antialiased">

    <!-- HEADER -->
    <div class="bg-blue-950 p-6 text-white text-center shadow-lg sticky top-0 z-40 border-b border-blue-900">
        <h1 id="header-title" class="text-xl font-black uppercase italic tracking-tighter">UNOS PODATAKA 📝</h1>
        <p class="text-[10px] opacity-70 font-bold" id="current-date"></p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- TAB 1: UNOS -->
        <div id="tab-input" class="space-y-4 text-center">
            <div id="forecast-card" class="bg-gradient-to-r from-blue-900 to-blue-700 p-4 rounded-3xl text-white shadow-md text-left">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-black uppercase italic">Prognoza & Savjet ☀️</p>
                    <button onclick="getForecast()" class="text-[9px] bg-white/20 px-2 py-1 rounded-lg">Ažuriraj</button>
                </div>
                <div id="forecast-data" class="mt-2 font-black text-lg italic italic">Učitavanje prognoze...</div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-200 space-y-4 text-center">
                <div class="grid grid-cols-2 gap-3 text-white">
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <label class="block text-[9px] font-black text-blue-400 uppercase italic text-center">1.8.1 (VT)</label>
                        <input type="number" id="in-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white" placeholder="0">
                        <span id="eur-in-vt" class="text-[10px] font-black text-blue-500">0.00 €</span>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <label class="block text-[9px] font-black text-blue-400 uppercase italic text-center">1.8.2 (NT)</label>
                        <input type="number" id="in-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white" placeholder="0">
                        <span id="eur-in-nt" class="text-[10px] font-black text-blue-400">0.00 €</span>
                    </div>
                    <div class="bg-green-50 p-3 rounded-2xl border border-green-100">
                        <label class="block text-[9px] font-black text-green-500 uppercase italic text-center">2.8.1 (VT)</label>
                        <input type="number" id="out-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white" placeholder="0">
                        <span id="eur-out-vt" class="text-[10px] font-black text-green-600">0.00 €</span>
                    </div>
                    <div class="bg-green-50 p-3 rounded-2xl border border-green-100 text-center">
                        <label class="block text-[9px] font-black text-green-400 uppercase italic text-center">2.8.2 (NT)</label>
                        <input type="number" id="out-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white" placeholder="0">
                        <span id="eur-out-nt" class="text-[10px] font-black text-green-500">0.00 €</span>
                    </div>
                </div>
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                    <label class="block text-[9px] font-black text-orange-500 uppercase italic text-center">Solar Inverter (kWh)</label>
                    <input type="number" id="sol-gen" oninput="liveCalc()" class="w-full bg-transparent font-black text-2xl outline-none text-orange-500 text-center" placeholder="0.0">
                </div>
                <button onclick="processData()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase italic tracking-widest active:scale-95 transition-all">Spremi i Analiziraj</button>
            </div>

            <div id="chart-section" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex items-end justify-between h-40 px-2 border-b-2 border-gray-800 mb-4">
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-1" class="bar-fill w-full bg-blue-600 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">1.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-2" class="bar-fill w-full bg-blue-400 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">1.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-3" class="bar-fill w-full bg-green-600 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">2.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-4" class="bar-fill w-full bg-green-400 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">2.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-5" class="bar-fill w-full bg-orange-500 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2 italic text-orange-600 uppercase">SOL</span></div>
                </div>
                <div id="final-summary" class="text-center text-xl font-black italic text-white"></div>
            </div>
        </div>

        <!-- TAB 2: ARHIVA -->
        <div id="tab-archive" class="hidden space-y-3 pb-10 text-center">
            <div id="history-list" class="space-y-3 text-center text-white"></div>
        </div>

        <!-- TAB 3: STATISTIKA -->
        <div id="tab-stats" class="hidden space-y-6">
            <div id="roi-card" class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-orange-500 text-left">
                <p class="text-[10px] font-black text-gray-500 uppercase italic mb-1">Ukupna Bilanca</p>
                <div id="roi-stats" class="flex justify-between items-end text-white font-bold">Učitavanje...</div>
            </div>
            <div id="stats-current" class="space-y-4 text-left text-white"></div>
            <div id="stats-history" class="space-y-4 text-left text-white"></div>
        </div>

        <!-- TAB 4: POSTAVKE -->
        <div id="tab-settings" class="hidden space-y-4 text-center">
            <div class="bg-white p-10 text-gray-500 italic uppercase text-[10px] font-black">Postavke Solar Monitora</div>
        </div>

    </div>

    <!-- NAVBAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-black pb-8 pt-2 px-6 flex justify-between items-center z-50">
        <button onclick="switchTab('input')" id="btn-input" class="flex flex-col items-center gap-1 active-tab">
            <span class="text-xl">📝</span>
            <span class="text-[10px] uppercase font-black italic">Unos</span>
        </button>
        <button onclick="switchTab('archive')" id="btn-archive" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="text-xl">📂</span>
            <span class="text-[10px] uppercase font-black italic">Arhiva</span>
        </button>
        <button onclick="switchTab('stats')" id="btn-stats" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="text-xl">📊</span>
            <span class="text-[10px] uppercase font-black italic">Stats</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-settings" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="text-xl">⚙️</span>
            <span class="text-[10px] uppercase font-black italic">Set</span>
        </button>
    </nav>

    <script>
        // TVOJ ORIGINALNI JS KOD
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('hr-HR');
        let solarHistory = JSON.parse(localStorage.getItem('solar_history')) || [];

        function switchTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active-tab');
                btn.classList.add('text-gray-500');
            });
            document.getElementById('btn-' + tab).classList.add('active-tab');
            document.getElementById('btn-' + tab).classList.remove('text-gray-500');
            if(tab === 'archive') renderArchive();
            if(tab === 'stats') renderStats();
        }

        function liveCalc() {
            const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
            const inVT = getVal('in-vt'), inNT = getVal('in-nt'), outVT = getVal('out-vt'), outNT = getVal('out-nt'), solar = getVal('sol-gen');

            document.getElementById('eur-in-vt').innerText = (inVT * 0.12).toFixed(2) + " €";
            document.getElementById('eur-in-nt').innerText = (inNT * 0.06).toFixed(2) + " €";
            document.getElementById('eur-out-vt').innerText = (outVT * 0.05).toFixed(2) + " €";
            document.getElementById('eur-out-nt').innerText = (outNT * 0.05).toFixed(2) + " €";

            const max = Math.max(inVT, inNT, outVT, outNT, solar, 1);
            document.getElementById('bar-1').style.height = (inVT/max*100) + "%";
            document.getElementById('bar-2').style.height = (inNT/max*100) + "%";
            document.getElementById('bar-3').style.height = (outVT/max*100) + "%";
            document.getElementById('bar-4').style.height = (outNT/max*100) + "%";
            document.getElementById('bar-5').style.height = (solar/max*100) + "%";
            
            document.getElementById('chart-section').classList.remove('hidden');
            document.getElementById('final-summary').innerText = "Neto: " + ((outVT+outNT) - (inVT+inNT)).toFixed(1) + " kWh";
        }

        function processData() {
            const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
            const entry = {
                date: new Date().toLocaleString('hr-HR'),
                inVT: getVal('in-vt'), inNT: getVal('in-nt'), outVT: getVal('out-vt'), outNT: getVal('out-nt'), solar: getVal('sol-gen')
            };
            solarHistory.push(entry);
            localStorage.setItem('solar_history', JSON.stringify(solarHistory));
            alert("Podaci spremljeni!");
            switchTab('archive');
        }

        function renderArchive() {
            const list = document.getElementById('history-list');
            list.innerHTML = solarHistory.length ? '' : '<p class="py-10 text-gray-600">Nema unosa.</p>';
            solarHistory.slice().reverse().forEach(item => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex justify-between items-center border-l-4 border-blue-500">
                        <div class="text-left">
                            <p class="text-[9px] text-gray-500 font-bold">${item.date}</p>
                            <p class="text-sm font-black italic">In: ${(item.inVT+item.inNT).toFixed(1)} kWh</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black italic text-orange-500">Sol: ${item.solar.toFixed(1)} kWh</p>
                        </div>
                    </div>`;
            });
        }

        function renderStats() {
            let tIn = 0, tOut = 0, tSol = 0;
            solarHistory.forEach(i => { tIn += (i.inVT + i.inNT); tOut += (i.outVT + i.outNT); tSol += i.solar; });
            document.getElementById('roi-stats').innerText = (tOut - tIn).toFixed(1) + " kWh (Neto)";
        }

        function getForecast() {
            document.getElementById('forecast-data').innerText = "Vrijeme: Vedro ☀️ Iskoristi Sunce!";
        }
    </script>
</body>
</html>
