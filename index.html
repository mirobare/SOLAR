<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Monitor Ultra 10700 - Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e7eb; }
        .active-tab { border-top: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .hidden { display: none; }
        .bar-fill { transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); min-height: 4px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-bg { background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        input { color-scheme: dark; }
        /* Custom card style for dark mode */
        .dark-card { background-color: #171717; border: 1px solid #262626; }
    </style>
</head>
<body class="pb-28 antialiased">

    <!-- HEADER -->
    <div class="bg-blue-950 p-6 text-white text-center shadow-2xl sticky top-0 z-40 border-b border-blue-900">
        <h1 id="header-title" class="text-xl font-black uppercase italic tracking-tighter">UNOS PODATAKA 📝</h1>
        <p class="text-[10px] opacity-70 font-bold" id="current-date"></p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- TAB 1: UNOS -->
        <div id="tab-input" class="space-y-4 text-center">
            <!-- PROGNOZA S PAMETNIM SAVJETOM -->
            <div id="forecast-card" class="bg-gradient-to-br from-blue-900 to-blue-700 p-4 rounded-3xl text-white shadow-lg text-left border border-blue-800">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-black uppercase italic opacity-80">Prognoza & Savjet ☀️</p>
                    <button onclick="getForecast()" class="text-[9px] bg-white/10 hover:bg-white/20 px-2 py-1 rounded-lg transition-colors">Ažuriraj</button>
                </div>
                <div id="forecast-data" class="mt-2 font-black text-lg italic text-blue-50">Učitavanje prognoze...</div>
            </div>

            <div class="dark-card p-5 rounded-3xl shadow-xl space-y-4 text-center">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-blue-950/30 p-3 rounded-2xl border border-blue-900/50">
                        <label class="block text-[9px] font-black text-blue-400 uppercase italic text-center">1.8.1 (VT)</label>
                        <input type="number" id="in-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white placeholder-gray-600" placeholder="0">
                        <span id="eur-in-vt" class="text-[10px] font-black text-blue-500">0.00 €</span>
                    </div>
                    <div class="bg-blue-950/30 p-3 rounded-2xl border border-blue-900/50">
                        <label class="block text-[9px] font-black text-blue-300 uppercase italic text-center">1.8.2 (NT)</label>
                        <input type="number" id="in-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white placeholder-gray-600" placeholder="0">
                        <span id="eur-in-nt" class="text-[10px] font-black text-blue-400">0.00 €</span>
                    </div>
                    <div class="bg-green-950/30 p-3 rounded-2xl border border-green-900/50">
                        <label class="block text-[9px] font-black text-green-400 uppercase italic text-center">2.8.1 (VT)</label>
                        <input type="number" id="out-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white placeholder-gray-600" placeholder="0">
                        <span id="eur-out-vt" class="text-[10px] font-black text-green-500">0.00 €</span>
                    </div>
                    <div class="bg-green-950/30 p-3 rounded-2xl border border-green-900/50 text-center">
                        <label class="block text-[9px] font-black text-green-300 uppercase italic text-center">2.8.2 (NT)</label>
                        <input type="number" id="out-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center text-white placeholder-gray-600" placeholder="0">
                        <span id="eur-out-nt" class="text-[10px] font-black text-green-400">0.00 €</span>
                    </div>
                </div>
                <div class="bg-orange-950/20 p-4 rounded-2xl border border-orange-900/50">
                    <label class="block text-[9px] font-black text-orange-400 uppercase italic text-center">Solar Inverter (kWh)</label>
                    <input type="number" id="sol-gen" oninput="liveCalc()" class="w-full bg-transparent font-black text-2xl outline-none text-orange-500 text-center placeholder-orange-900" placeholder="0.0">
                </div>
                <button onclick="processData()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg uppercase italic tracking-widest active:scale-95 transition-all">Spremi i Analiziraj</button>
            </div>

            <div id="chart-section" class="hidden dark-card p-6 rounded-3xl shadow-xl">
                <div class="flex items-end justify-between h-40 px-2 border-b border-gray-800 mb-4">
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-1" class="bar-fill w-full bg-blue-600 rounded-t-md shadow-[0_0_10px_rgba(37,99,235,0.4)]" style="height: 0%"></div><span class="text-[8px] font-black mt-2 text-gray-400">1.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-2" class="bar-fill w-full bg-blue-400 rounded-t-md shadow-[0_0_10px_rgba(96,165,250,0.4)]" style="height: 0%"></div><span class="text-[8px] font-black mt-2 text-gray-400">1.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-3" class="bar-fill w-full bg-green-600 rounded-t-md shadow-[0_0_10px_rgba(22,163,74,0.4)]" style="height: 0%"></div><span class="text-[8px] font-black mt-2 text-gray-400">2.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-4" class="bar-fill w-full bg-green-400 rounded-t-md shadow-[0_0_10px_rgba(74,222,128,0.4)]" style="height: 0%"></div><span class="text-[8px] font-black mt-2 text-gray-400">2.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-5" class="bar-fill w-full bg-orange-500 rounded-t-md shadow-[0_0_10px_rgba(249,115,22,0.4)]" style="height: 0%"></div><span class="text-[8px] font-black mt-2 italic text-orange-500 uppercase">SOL</span></div>
                </div>
                <div id="final-summary" class="text-center text-xl font-black italic text-white"></div>
            </div>
        </div>

        <!-- TAB 2: ARHIVA -->
        <div id="tab-archive" class="hidden space-y-3 pb-10 text-center">
            <div class="flex justify-between items-center px-2 mb-2">
                <div class="flex gap-2">
                    <button onclick="exportData()" class="bg-blue-900/50 text-blue-300 text-[9px] font-black px-3 py-2 rounded-full border border-blue-800 uppercase tracking-wider">☁️ Export</button>
                    <label class="bg-gray-800 text-gray-300 text-[9px] font-black px-3 py-2 rounded-full border border-gray-700 uppercase tracking-wider cursor-pointer">
                        📂 Import <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                    </label>
                </div>
                <button onclick="deleteSelected()" id="del-btn" class="hidden bg-red-900/50 text-red-300 text-[9px] font-black px-4 py-2 rounded-full border border-red-800 uppercase tracking-wider">Obriši</button>
            </div>
            <div id="history-list" class="space-y-3 text-center text-gray-300"></div>
        </div>

        <!-- TAB 3: STATISTIKA -->
        <div id="tab-stats" class="hidden space-y-6">
            <div id="roi-card" class="dark-card p-5 rounded-3xl shadow-xl border-l-8 border-orange-500 text-left">
                <p class="text-[10px] font-black text-gray-500 uppercase italic mb-1">Povrat Investicije (ROI)</p>
                <div id="roi-stats" class="flex justify-between items-end text-white font-bold">Učitavanje...</div>
            </div>
            <div id="stats-current" class="space-y-4 text-left text-gray-300"></div>
            <div id="stats-history" class="space-y-4 text-left text-gray-300"></div>
        </div>

        <!-- TAB 4: POSTAVKE -->
        <div id="tab-settings" class="hidden space-y-4 text-center">
            <!-- Dodajte ovdje sadržaj za postavke ako je potrebno, također koristeći .dark-card klasu -->
        </div>

    </div>

    <!-- NAVBAR FIXED BOTTOM -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#121212] border-t border-gray-800 pb-8 pt-2 px-6 flex justify-between items-center z-50">
        <button onclick="switchTab('input')" id="btn-input" class="flex flex-col items-center gap-1 transition-all active-tab">
            <span class="text-xl">📝</span>
            <span class="text-[10px] uppercase font-black italic">Unos</span>
        </button>
        <button onclick="switchTab('archive')" id="btn-archive" class="flex flex-col items-center gap-1 transition-all text-gray-500">
            <span class="text-xl">📂</span>
            <span class="text-[10px] uppercase font-black italic">Arhiva</span>
        </button>
        <button onclick="switchTab('stats')" id="btn-stats" class="flex flex-col items-center gap-1 transition-all text-gray-500">
            <span class="text-xl">📊</span>
            <span class="text-[10px] uppercase font-black italic">Statistika</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-settings" class="flex flex-col items-center gap-1 transition-all text-gray-500">
            <span class="text-xl">⚙️</span>
            <span class="text-[10px] uppercase font-black italic">Postavke</span>
        </button>
    </nav>

    <script>
        // Ovdje ubaci ostatak svoje JavaScript logike (switchTab, liveCalc, processData itd.)
        // Logika ostaje ista jer se klase (hidden, active-tab) poklapaju.
        function switchTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active-tab');
                btn.classList.add('text-gray-500');
            });
            document.getElementById('btn-' + tab).classList.add('active-tab');
            document.getElementById('btn-' + tab).classList.remove('text-gray-500');
        }
    </script>
</body>
</html>
