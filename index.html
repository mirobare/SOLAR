<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro Mobile</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FFD60A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        
        .section-title { font-size: 0.75rem; color: var(--gray); margin: 15px 0 5px 10px; text-transform: uppercase; letter-spacing: 1px; }
        .row-card { background: var(--card); border-radius: 14px; padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .full { grid-column: span 2; }
        
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; }
        .code { font-size: 0.65rem; color: var(--accent); font-weight: bold; margin-bottom: 2px; }
        label { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }
        input { background: transparent; border: none; color: #fff; font-size: 1.2rem; font-weight: bold; outline: none; width: 100%; }
        .euro-hint { font-size: 0.75rem; color: var(--gray); margin-top: 4px; border-top: 1px solid #3a3a3c; padding-top: 4px; }
        
        button { background: var(--green); color: #000; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; font-size: 1.1rem; margin-top: 10px; box-shadow: 0 4px 15px rgba(50, 215, 75, 0.3); }
        
        /* ROI Header */
        .roi-header { background: linear-gradient(145deg, #1c1c1e, #2c2c2e); padding: 20px; border-radius: 16px; margin-bottom: 20px; text-align: center; border: 1px solid #333; }
        .roi-bar { background: #333; height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .roi-fill { background: var(--solar); height: 100%; width: 0%; transition: 1s; }

        .date-input { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 6px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- ROI STATUS -->
    <div class="roi-header">
        <div style="font-size: 0.8rem; color: var(--gray);">OTPLATA INVESTICIJE</div>
        <div style="font-size: 2rem; font-weight: 900; color: var(--solar);" id="roiText">0.00 €</div>
        <div class="roi-bar"><div id="roiBar" class="roi-fill"></div></div>
        <div style="display:flex; justify-content: space-between; font-size: 0.7rem; color: var(--gray);">
            <span>0 €</span><span>CILJ: 10.700 €</span>
        </div>
    </div>

    <!-- RED 1: DATUM I IMPORT -->
    <div class="section-title">Red 1: Vrijeme i Uvoz (Mreža)</div>
    <div class="row-card">
        <div class="input-box full">
            <label>Datum očitanja</label>
            <input type="date" id="date" class="date-input">
        </div>
        <div class="input-box">
            <span class="code">1.8.1 (VT)</span>
            <label>Uvoz VT</label>
            <input type="number" id="iVT" placeholder="kWh" oninput="calc(this, 0.14)">
            <div class="euro-hint"><span id="iVT_e">0.00</span> €</div>
        </div>
        <div class="input-box">
            <span class="code">1.8.2 (NT)</span>
            <label>Uvoz NT</label>
            <input type="number" id="iNT" placeholder="kWh" oninput="calc(this, 0.07)">
            <div class="euro-hint"><span id="iNT_e">0.00</span> €</div>
        </div>
    </div>

    <!-- RED 2: EXPORT -->
    <div class="section-title">Red 2: Izvoz (Višak u mrežu)</div>
    <div class="row-card">
        <div class="input-box">
            <span class="code">2.8.1 (VT)</span>
            <label>Izvoz VT</label>
            <input type="number" id="eVT" placeholder="kWh" oninput="calc(this, 0.14)">
            <div class="euro-hint"><span id="eVT_e">0.00</span> €</div>
        </div>
        <div class="input-box">
            <span class="code">2.8.2 (NT)</span>
            <label>Izvoz NT</label>
            <input type="number" id="eNT" placeholder="kWh" oninput="calc(this, 0.07)">
            <div class="euro-hint"><span id="eNT_e">0.00</span> €</div>
        </div>
    </div>

    <!-- RED 3: SOLAR I HEP -->
    <div class="section-title">Red 3: Proizvodnja i Trošak</div>
    <div class="row-card">
        <div class="input-box">
            <span class="code">ECU-R</span>
            <label>Solari</label>
            <input type="number" id="prod" placeholder="kWh" oninput="calc(this, 0.14)">
            <div class="euro-hint"><span id="prod_e">0.00</span> €</div>
        </div>
        <div class="input-box">
            <span class="code">RAČUN</span>
            <label>HEP Plaćeno</label>
            <input type="number" id="hep" placeholder="Iznos €">
            <div class="euro-hint">Mjesečni trošak</div>
        </div>
    </div>

    <button onclick="save()">SPREMI DNEVNI UNOS</button>
    <div id="status" style="text-align:center; margin-top:10px; font-size:0.8rem; color:var(--green)"></div>
</div>

<script>
    const INV = 10700;
    let db = JSON.parse(localStorage.getItem('solarFinalMobileDB')) || [];
    document.getElementById('date').valueAsDate = new Date();

    // Funkcija koja računa eure dok tipkaš
    function calc(el, price) {
        const val = parseFloat(el.value) || 0;
        document.getElementById(el.id + '_e').innerText = (val * price).toFixed(2);
    }

    function save() {
        const entry = {
            d: document.getElementById('date').value,
            p: parseFloat(document.getElementById('prod').value) || 0,
            ivt: parseFloat(document.getElementById('iVT').value) || 0,
            int: parseFloat(document.getElementById('iNT').value) || 0,
            evt: parseFloat(document.getElementById('eVT').value) || 0,
            ent: parseFloat(document.getElementById('eNT').value) || 0,
            hep: parseFloat(document.getElementById('hep').value) || 0
        };
        db.push(entry);
        localStorage.setItem('solarFinalMobileDB', JSON.stringify(db));
        
        document.getElementById('status').innerText = "Podaci spremljeni! 🎉";
        setTimeout(() => document.getElementById('status').innerText = "", 3000);
        updateROI();
    }

    function updateROI() {
        // Ušteda je ukupno proizvedena energija x cijena VT (kao prosjek)
        let totalSavings = db.reduce((sum, r) => sum + (r.p * 0.14), 0);
        document.getElementById('roiText').innerText = totalSavings.toFixed(2) + " €";
        document.getElementById('roiBar').style.width = Math.min((totalSavings/INV*100), 100) + "%";
    }

    updateROI();
</script>

</body>
</html>
