<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v20</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
        
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .tab-content { display: none; padding: 10px; max-width: 800px; margin: auto; }
        .tab-content.active { display: block; }

        /* Arhiva - Kompaktan red sa svim podacima i eurima */
        .archive-line { display: flex; align-items: center; background: var(--card); padding: 8px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid var(--solar); font-size: 0.7rem; white-space: nowrap; overflow-x: auto; text-align: left; }
        .archive-data { display: flex; gap: 8px; align-items: center; margin-left: 8px; }
        
        .eur { font-size: 0.6rem; opacity: 0.8; margin-left: 2px; }
        .val-i { color: var(--red); font-weight: bold; }
        .val-e { color: var(--green); font-weight: bold; }
        .val-p { color: var(--solar); font-weight: bold; }
        .val-h { color: #fff; border-left: 1px solid #444; padding-left: 5px; }

        /* Unos (v18/19 baza) */
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 10px; border-bottom: 3px solid #444; }
        input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; outline: none; font-weight: bold; }
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: block; }
        button.main-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button id="btn-unos" class="nav-btn active" onclick="showTab('unos')">Unos</button>
        <button id="btn-arhiva" class="nav-btn" onclick="showTab('arhiva')">Arhiva</button>
        <button id="btn-stat" class="nav-btn" onclick="showTab('stat')">Statistika</button>
        <button id="btn-postavke" class="nav-btn" onclick="showTab('postavke')">Postavke</button>
    </nav>

    <!-- UNOS -->
    <div id="unos" class="tab-content active">
        <div class="card">
            <div class="input-row" style="grid-template-columns: 1fr;"><div class="input-box"><label>Datum</label><input type="date" id="date"></div></div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz VT</label><input type="number" id="iVT"></div>
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz NT</label><input type="number" id="iNT"></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz VT</label><input type="number" id="eVT"></div>
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz NT</label><input type="number" id="eNT"></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--solar)"><label>Solari (kWh)</label><input type="number" id="prod"></div>
                <div class="input-box" style="border-color:#fff"><label>HEP (€)</label><input type="number" id="hep"></div>
            </div>
            <button class="main-btn" onclick="saveData()">SPREMI UNOS</button>
        </div>
    </div>

    <!-- ARHIVA (Sve u jednom redu s Eurima) -->
    <div id="arhiva" class="tab-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0">Arhiva</h3>
            <button onclick="deleteSelected()" style="background:var(--red); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem;">OBRIŠI</button>
        </div>
        <div id="archiveList"></div>
    </div>

    <!-- POSTAVKE -->
    <div id="postavke" class="tab-content">
        <div class="card">
            <label>Investicija (€)</label><input type="number" id="cfgInv">
            <label>Cijena VT (€)</label><input type="number" id="cfgVT" step="0.001">
            <label>Cijena NT (€)</label><input type="number" id="cfgNT" step="0.001">
            <label>Otkup HEP (€)</label><input type="number" id="cfgSell" step="0.001">
            <button class="main-btn" style="margin-top:10px" onclick="saveCfg()">SPREMI</button>
        </div>
        <button style="background:#444; color:white; border:none; padding:12px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer;" onclick="exportXML()">📥 IZVOZ U XML</button>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('solar_v20')) || [];
    let cfg = JSON.parse(localStorage.getItem('solar_cfg_v20')) || { inv: 10700, vt: 0.14, nt: 0.07, sell: 0.04 };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'arhiva') renderArchive();
    }

    function saveData() {
        const entry = {
            id: Date.now(), d: document.getElementById('date').value,
            ivt: parseFloat(document.getElementById('iVT').value) || 0,
            int: parseFloat(document.getElementById('iNT').value) || 0,
            evt: parseFloat(document.getElementById('eVT').value) || 0,
            ent: parseFloat(document.getElementById('eNT').value) || 0,
            p: parseFloat(document.getElementById('prod').value) || 0,
            h: parseFloat(document.getElementById('hep').value) || 0
        };
        db.push(entry);
        localStorage.setItem('solar_v20', JSON.stringify(db));
        alert("Spremljeno!");
    }

    function renderArchive() {
        const list = document.getElementById('archiveList');
        list.innerHTML = '';
        [...db].reverse().forEach(r => {
            const eS = (r.p * cfg.vt).toFixed(1);
            const eI1 = (r.ivt * cfg.vt).toFixed(1);
            const eI2 = (r.int * cfg.nt).toFixed(1);
            const eE1 = (r.evt * cfg.sell).toFixed(1);
            const eE2 = (r.ent * cfg.sell).toFixed(1);

            list.innerHTML += `
                <div class="archive-line">
                    <input type="checkbox" class="cb" data-id="${r.id}">
                    <strong style="margin:0 5px">${r.d.slice(5)}</strong>
                    <div class="archive-data">
                        <span class="val-p">S:${r.p}<span class="eur">${eS}€</span></span>
                        <span class="val-i">U:${r.ivt}<span class="eur">${eI1}€</span> | ${r.int}<span class="eur">${eI2}€</span></span>
                        <span class="val-e">X:${r.evt}<span class="eur">${eE1}€</span> | ${r.ent}<span class="eur">${eE2}€</span></span>
                        <span class="val-h">H:${r.h}€</span>
                    </div>
                </div>`;
        });
    }

    function exportXML() {
        let xml = '<?xml version="1.0" encoding="UTF-8"?><SolarData>';
        db.forEach(r => xml += `<Entry><Datum>${r.d}</Datum><Solar>${r.p}</Solar><UvozVT>${r.ivt}</UvozVT><UvozNT>${r.int}</UvozNT><IzvozVT>${r.evt}</IzvozVT><IzvozNT>${r.ent}</IzvozNT><HEP>${r.h}</HEP></Entry>`);
        xml += '</SolarData>';
        const blob = new Blob([xml], { type: 'text/xml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'solar_arhiva.xml';
        a.click();
    }

    document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
