<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Monitor Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; font-family: sans-serif; }
        .active-tab { border-top: 4px solid #2563eb; color: #3b82f6 !important; font-weight: 900; }
        .hidden { display: none; }
        .bar-fill { transition: height 0.8s ease-out; min-height: 2px; }
        input { background: transparent !important; color: #ffffff !important; border-bottom: 1px solid #333 !important; padding: 5px; text-align: center; width: 100%; font-weight: bold; font-size: 1.1rem; outline: none; }
        .bg-white { background-color: #111111 !important; border-color: #222222 !important; color: white !important; }
        nav { background-color: #0a0a0a !important; border-top: 1px solid #222 !important; }
    </style>
</head>
<body class="pb-32 antialiased">

    <!-- HEADER -->
    <div class="bg-blue-950 p-6 text-white text-center shadow-lg border-b border-blue-900 sticky top-0 z-50">
        <h1 class="text-xl font-black uppercase italic tracking-tighter text-blue-400">SOLAR MONITOR ☀️</h1>
        <p class="text-[10px] opacity-70 font-bold" id="current-date"></p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- TAB 1: UNOS -->
        <div id="tab-input" class="space-y-4">
            
            <!-- REAL-TIME PROGNOZA (LOKACIJA) -->
            <div class="bg-gradient-to-r from-blue-900 to-indigo-900 p-4 rounded-3xl border border-blue-800 shadow-xl">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-black uppercase text-blue-300 italic">Prognoza: <span id="loc-name">Tražim lokaciju...</span></span>
                    <button onclick="getRealWeather()" class="text-[9px] bg-white/10 px-2 py-1 rounded-full font-bold">Osvježi</button>
                </div>
                <div id="forecast-text" class="text-sm font-bold text-white italic underline decoration-blue-500">Učitavam oblake...</div>
                <div id="forecast-advice" class="mt-2 text-[10px] font-black uppercase p-2 rounded-xl bg-blue-900/20 border border-blue-800/40 text-blue-400 italic text-center">Čekam podatke...</div>
            </div>

            <!-- FORMA ZA UNOS -->
            <div class="bg-white p-5 rounded-3xl shadow-sm space-y-4 border border-gray-800">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-blue-950/40 p-3 rounded-2xl border border-blue-900/30">
                        <label class="block text-[9px] font-black text-blue-400 uppercase italic mb-1 text-center">1.8.1 (VT)</label>
                        <input type="number" id="in-vt" oninput="osvjeziGraf()" placeholder="0">
                    </div>
                    <div class="bg-blue-950/40 p-3 rounded-2xl border border-blue-900/30">
                        <label class="block text-[9px] font-black text-blue-300 uppercase italic mb-1 text-center">1.8.2 (NT)</label>
                        <input type="number" id="in-nt" oninput="osvjeziGraf()" placeholder="0">
                    </div>
                    <div class="bg-green-950/40 p-3 rounded-2xl border border-green-900/30">
                        <label class="block text-[9px] font-black text-green-500 uppercase italic mb-1 text-center">2.8.1 (VT)</label>
                        <input type="number" id="out-vt" oninput="osvjeziGraf()" placeholder="0">
                    </div>
                    <div class="bg-green-950/40 p-3 rounded-2xl border border-green-900/30">
                        <label class="block text-[9px] font-black text-green-400 uppercase italic mb-1 text-center">2.8.2 (NT)</label>
                        <input type="number" id="out-nt" oninput="osvjeziGraf()" placeholder="0">
                    </div>
                </div>
                <div class="bg-orange-950/20 p-4 rounded-2xl border border-orange-900/30 text-center">
                    <label class="block text-[9px] font-black text-orange-500 uppercase italic mb-1 text-center">Solar Inverter (kWh)</label>
                    <input type="number" id="sol-gen" oninput="osvjeziGraf()" class="text-2xl text-orange-500" placeholder="0.0">
                </div>
                <!-- GUMB S DIREKTNOM FUNKCIJOM -->
                <button type="button" id="main-save-btn" onclick="finalniSpremi()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase italic tracking-widest active:scale-95 transition-all">Spremi i Analiziraj</button>
            </div>
        </div>

        <!-- TAB 2: ARHIVA -->
        <div id="tab-archive" class="hidden space-y-3 pb-20">
            <h2 class="text-xs font-black uppercase text-gray-500 italic px-2">Povijest Unosa</h2>
            <div id="archive-list" class="space-y-3"></div>
        </div>

        <!-- TAB 3: STATUS (PO DANIMA, MJESECIMA, GODINAMA) -->
        <div id="tab-status" class="hidden space-y-4 pb-20">
            <div class="bg-white p-5 rounded-3xl border-t-4 border-blue-600 shadow-xl text-center">
                <h3 class="text-[10px] font-black text-gray-500 uppercase italic mb-4">Kumulativni Status</h3>
                <div id="status-total-grid" class="grid grid-cols-2 gap-2 mb-3"></div>
                <div class="bg-blue-600 p-3 rounded-2xl shadow-lg">
                    <p class="text-[8px] font-bold text-blue-100 uppercase italic text-center">Ukupna Ušteda (ROI)</p>
                    <p id="total-savings-eur" class="text-xl font-black italic text-white text-center">0.00 €</p>
                </div>
            </div>
            <div id="status-groups" class="space-y-5"></div>
        </div>

        <!-- TAB 4: POSTAVKE -->
        <div id="tab-settings" class="hidden">
            <div class="bg-white p-6 rounded-3xl border border-gray-800">
                <h2 class="font-black text-white uppercase text-xs border-b border-gray-800 pb-2 mb-6 italic">Postavke Tarifa</h2>
                <div class="space-y-4">
                    <div class="flex justify-between items-center"><label class="text-xs font-bold text-gray-400">VT Kupnja (€)</label><input type="number" id="p-vt" step="0.001" value="0.16"></div>
                    <div class="flex justify-between items-center"><label class="text-xs font-bold text-gray-400">NT Kupnja (€)</label><input type="number" id="p-nt" step="0.001" value="0.08"></div>
                    <div class="flex justify-between items-center"><label class="text-xs font-bold text-green-500">Otkup viška (€)</label><input type="number" id="p-out" step="0.001" value="0.07"></div>
                </div>
                <button onclick="spremiCijene()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black mt-8 uppercase italic tracking-widest">Spremi cijene</button>
                <button onclick="if(confirm('Obriši sve?')) { localStorage.removeItem('solar_v3'); location.reload(); }" class="w-full text-red-900 text-[9px] font-black mt-8 uppercase italic opacity-50">Resetiraj memoriju</button>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="fixed bottom-0 left-0 right-0 flex justify-around text-[10px] font-black text-gray-500 z-50">
        <button onclick="otvoriTab('input')" id="btn-input" class="flex-1 py-4 active-tab uppercase">Unos</button>
        <button onclick="otvoriTab('archive')" id="btn-archive" class="flex-1 py-4 uppercase">Arhiva</button>
        <button onclick="otvoriTab('status')" id="btn-status" class="flex-1 py-4 uppercase">Status</button>
        <button onclick="otvoriTab('settings')" id="btn-settings" class="flex-1 py-4 uppercase">Set</button>
    </nav>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('hr-HR', { weekday: 'long', day: 'numeric', month: 'long' });
        
        let db = JSON.parse(localStorage.getItem('solar_v3')) || [];

        function otvoriTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active-tab', 'text-blue-600');
                btn.classList.add('text-gray-500');
            });
            document.getElementById('btn-' + tab).classList.add('active-tab', 'text-blue-600');
            
            if(tab === 'archive') osvjeziArhivu();
            if(tab === 'status') osvjeziStatus();
        }

        // FUNKCIJA KOJA POPRAVLJA GUMB
        function finalniSpremi() {
            const v = (id) => parseFloat(document.getElementById(id).value) || 0;
            const t = new Date();
            
            const zapis = {
                id: Date.now(),
                datum: t.toLocaleDateString('hr-HR'),
                vrijeme: t.toLocaleTimeString('hr-HR', {hour:'2.digit', minute:'2.digit'}),
                mjesec: t.toLocaleString('hr-HR', {month:'long', year:'numeric'}),
                godina: t.getFullYear().toString(),
                ivt: v('in-vt'), int: v('in-nt'), ovt: v('out-vt'), ont: v('out-nt'), sol: v('sol-gen'),
                cijenaVT: parseFloat(document.getElementById('p-vt').value) || 0.16,
                cijenaNT: parseFloat(document.getElementById('p-nt').value) || 0.08,
                cijenaOut: parseFloat(document.getElementById('p-out').value) || 0.07
            };

            db.push(zapis);
            localStorage.setItem('solar_v3', JSON.stringify(db));
            
            // Očisti polja
            ['in-vt', 'in-nt', 'out-vt', 'out-nt', 'sol-gen'].forEach(id => document.getElementById(id).value = "");
            
            alert("Uspješno spremljeno u bazu!");
            otvoriTab('archive');
        }

        function osvjeziArhivu() {
            const container = document.getElementById('archive-list');
            container.innerHTML = db.length ? '' : '<p class="opacity-30 text-center py-10 italic">Baza je prazna.</p>';
            db.slice().reverse().forEach(x => {
                container.innerHTML += `
                <div class="bg-white p-4 rounded-3xl flex justify-between items-center border-l-4 border-blue-600 mb-2">
                    <div class="text-left"><p class="text-[8px] font-bold text-gray-500 uppercase">${x.datum} • ${x.vrijeme}</p><p class="text-xs font-black italic">Kupljeno: ${(x.ivt+x.int).toFixed(1)} kWh</p></div>
                    <div class="text-right text-orange-500 font-black italic">${x.sol.toFixed(1)} kWh</div>
                </div>`;
            });
        }

        function osvjeziStatus() {
            const groups = document.getElementById('status-groups');
            const totalBox = document.getElementById('status-total-grid');
            let s = { t: { kI:0, kO:0, kS:0, eI:0 }, d:{}, m:{}, g:{} };

            db.forEach(i => {
                const kI = i.ivt + i.int; const kO = i.ovt + i.ont;
                const eI = (i.ivt * i.cijenaVT) + (i.int * i.cijenaNT);
                const add = (o) => {
                    if(!o) o = { kI:0, kO:0, kS:0, eI:0 };
                    o.kI += kI; o.kO += kO; o.kS += i.sol; o.eI += eI;
                    return o;
                };
                s.t = add(s.t); s.d[i.datum] = add(s.d[i.datum]); s.m[i.mjesec] = add(s.m[i.mjesec]); s.g[i.godina] = add(s.g[i.godina]);
            });

            totalBox.innerHTML = `
                <div class="bg-blue-900/40 p-2 rounded-xl border border-blue-800"><p class="text-[7px] text-blue-400 font-bold uppercase">Kupnja</p><p class="text-xs font-black text-white">${s.t.kI.toFixed(1)} kWh</p></div>
                <div class="bg-green-900/40 p-2 rounded-xl border border-green-800"><p class="text-[7px] text-green-400 font-bold uppercase">Prodaja</p><p class="text-xs font-black text-white">${s.t.kO.toFixed(1)} kWh</p></div>`;
            document.getElementById('total-savings-eur').innerText = (s.t.kS * 0.15).toFixed(2) + " €";

            const build = (lbl, map) => {
                let h = `<h2 class="text-[10px] font-black uppercase text-gray-600 px-2 italic mt-4">${lbl}</h2>`;
                Object.keys(map).reverse().slice(0, 10).forEach(k => {
                    const d = map[k];
                    h += `<div class="bg-white p-3 rounded-2xl border-l-4 border-gray-800 mb-2">
                        <p class="text-[9px] font-black text-gray-500 border-b border-gray-800 pb-1 mb-2 uppercase">${k}</p>
                        <div class="flex justify-between text-center">
                            <div><p class="text-[7px] text-blue-400 font-bold uppercase">In</p><p class="text-[10px] font-black">${d.kI.toFixed(1)}</p></div>
                            <div><p class="text-[7px] text-green-400 font-bold uppercase">Out</p><p class="text-[10px] font-black">${d.kO.toFixed(1)}</p></div>
                            <div><p class="text-[7px] text-orange-500 font-bold uppercase italic">Solar</p><p class="text-[10px] font-black text-orange-500">${d.kS.toFixed(1)}</p></div>
                        </div>
                    </div>`;
                });
                return h;
            };
            groups.innerHTML = build("Povijest po Danima", s.d) + build("Po Mjesecima", s.m) + build("Godišnje", s.g);
        }

        // NOVO: PROGNOZA PREMA TVOJOJ LOKACIJI
        async function getRealWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                document.getElementById('loc-name').innerText = "Moja lokacija 📍";
                try {
                    const res = await fetch(`https://api.open-meteo.com{latitude}&longitude=${longitude}&current_weather=true`);
                    const data = await res.json();
                    const code = data.current_weather.weathercode;
                    const temp = data.current_weather.temperature;
                    
                    let txt = "Djelomično oblačno", adv = "SAVJET: Snaga je dobra, iskoristi Sunce!", sun = true;
                    if(code <= 2) { txt = "Vedro i sunčano ☀️"; adv = "SAVJET: Sunce prži! Upali perilicu i klimu!"; sun = true; }
                    if(code >= 51) { txt = "Oblačno / Kiša 🌧️"; adv = "SAVJET: Slaba snaga. Štedi struju danas!"; sun = false; }
                    
                    document.getElementById('forecast-text').innerText = `${temp}°C - ${txt}`;
                    document.getElementById('forecast-advice').innerText = adv;
                    document.getElementById('forecast-advice').className = sun ? "mt-2 text-[10px] font-black uppercase p-2 rounded-xl bg-orange-900/20 border border-orange-800/40 text-orange-400 italic text-center" : "mt-2 text-[10px] font-black uppercase p-2 rounded-xl bg-blue-900/20 border border-blue-800/40 text-blue-400 italic text-center";
                } catch (e) {
                    document.getElementById('forecast-text').innerText = "Greška u učitavanju...";
                }
            }, () => {
                document.getElementById('loc-name').innerText = "Lokacija nedostupna";
                document.getElementById('forecast-text').innerText = "Omogući GPS za prognozu";
            });
        }

        function spremiCijene() {
            localStorage.setItem('p_vt_3', document.getElementById('p-vt').value);
            localStorage.setItem('p_nt_3', document.getElementById('p-nt').value);
            localStorage.setItem('p_out_3', document.getElementById('p-out').value);
            alert("Cijene spremljene!");
        }

        window.onload = () => {
            if(localStorage.getItem('p_vt_3')) {
                document.getElementById('p-vt').value = localStorage.getItem('p_vt_3');
                document.getElementById('p-nt').value = localStorage.getItem('p_nt_3');
                document.getElementById('p-out').value = localStorage.getItem('p_out_3');
            }
            getRealWeather();
        };
    </script>
</body>
</html>
