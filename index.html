<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v15</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
        
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .tab-content { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .tab-content.active { display: block; }

        /* Unos Kartice */
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 12px; border-bottom: 3px solid #444; }
        .box-import { border-color: var(--red); color: var(--red); }
        .box-export { border-color: var(--green); color: var(--green); }
        .box-solar { border-color: var(--solar); color: var(--solar); }
        
        label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; display: block; }
        input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; outline: none; font-weight: bold; }
        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Arhiva Jedan Red */
        .archive-line { display: flex; align-items: center; background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.75rem; border-left: 4px solid var(--solar); white-space: nowrap; overflow-x: auto; }
        .archive-data { display: flex; gap: 10px; flex: 1; margin-left: 10px; }

        /* Vertikalni Grafovi (Statistika) */
        .graph-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; height: 150px; align-items: flex-end; margin-bottom: 30px; padding: 10px; background: #111; border-radius: 10px; border: 1px solid #333; }
        .v-bar { width: 100%; border-radius: 5px 5px 0 0; position: relative; transition: height 0.5s; }
        .v-label { position: absolute; bottom: -20px; width: 100%; text-align: center; font-size: 0.6rem; color: var(--gray); }

        /* ROI */
        .roi-bar { background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .roi-fill { background: var(--solar); height: 100%; width: 0%; transition: 1s; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button id="btn-unos" class="nav-btn active" onclick="showTab('unos')">Unos</button>
        <button id="btn-arhiva" class="nav-btn" onclick="showTab('arhiva')">Arhiva</button>
        <button id="btn-stat" class="nav-btn" onclick="showTab('stat')">Statistika</button>
        <button id="btn-postavke" class="nav-btn" onclick="showTab('postavke')">Postavke</button>
    </nav>

    <!-- UNOS -->
    <div id="unos" class="tab-content active">
        <div class="card" style="text-align: center; color: var(--solar); font-weight: bold; border-color: var(--solar);">☀️ PETRINJA: SUNČANO</div>
        <div class="card">
            <div class="input-row" style="grid-template-columns: 1fr;"><div class="input-box" style="border-color:var(--accent)"><label>Datum</label><input type="date" id="date"></div></div>
            <div class="input-row">
                <div class="input-box box-import"><label>Uvoz VT</label><input type="number" id="iVT"></div>
                <div class="input-box box-import"><label>Uvoz NT</label><input type="number" id="iNT"></div>
            </div>
            <div class="input-row">
                <div class="input-box box-export"><label>Izvoz VT</label><input type="number" id="eVT"></div>
                <div class="input-box box-export"><label>Izvoz NT</label><input type="number" id="eNT"></div>
            </div>
            <div class="input-row">
                <div class="input-box box-solar"><label>Solari (kWh)</label><input type="number" id="prod"></div>
                <div class="input-box" style="border-color:#fff"><label>HEP (€)</label><input type="number" id="hep"></div>
            </div>
            <button class="main-btn" onclick="saveData()">SPREMI UNOS</button>
        </div>
        <!-- Graf u Unosu (Popravljen) -->
        <div id="graph-unos" class="graph-row" style="height: 100px;"></div>
    </div>

    <!-- ARHIVA -->
    <div id="arhiva" class="tab-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <h3 style="margin:0">Arhiva</h3>
            <button onclick="deleteSelected()" style="background:var(--red); border:none; color:#fff; padding:5px 10px; border-radius:5px;">OBRIŠI</button>
        </div>
        <div id="archiveList"></div>
    </div>

    <!-- STATISTIKA -->
    <div id="stat" class="tab-content">
        <h3>Proizvodnja (Dan / Mjesec / Godina)</h3>
        <div id="stat-graph-p" class="graph-row"></div>
        
        <h3 style="color:var(--red)">Uvoz iz mreže</h3>
        <div id="stat-graph-i" class="graph-row"></div>

        <h3 style="color:var(--green)">Izvoz u mrežu</h3>
        <div id="stat-graph-e" class="graph-row"></div>
        
        <div id="yearlyInfo"></div>
    </div>

    <!-- POSTAVKE -->
    <div id="postavke" class="tab-content">
        <div class="card" style="text-align: center;">
            <div id="roiTotal" style="font-size: 1.8rem; font-weight: 900; color: var(--solar);">0.00 €</div>
            <div class="roi-bar"><div id="roiFill" class="roi-fill"></div></div>
            <small id="roiPerc" style="color:var(--gray)">0% Isplaćeno</small>
        </div>
        <div class="card">
            <label>Investicija (€)</label><input type="number" id="cfgInv">
            <label>Cijena Kupnje VT (€)</label><input type="number" id="cfgVT" step="0.001">
            <label>Cijena Kupnje NT (€)</label><input type="number" id="cfgNT" step="0.001">
            <label style="color:var(--green)">Cijena Otkupa HEP (€)</label><input type="number" id="cfgSell" step="0.001">
            <button class="main-btn" onclick="saveCfg()" style="margin-top:10px;">SPREMI</button>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('solar_v15')) || [];
    let cfg = JSON.parse(localStorage.getItem('solar_cfg_v15')) || { inv: 10700, vt: 0.14, nt: 0.07, sell: 0.04 };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        
        if(id === 'unos') renderGraphUnos();
        if(id === 'arhiva') renderArchive();
        if(id === 'stat') renderAllStats();
        if(id === 'postavke') renderROI();
    }

    function saveData() {
        const d = document.getElementById('date').value;
        if(!d) return alert("Datum!");
        const entry = {
            id: Date.now(), date: d,
            p: parseFloat(document.getElementById('prod').value) || 0,
            ivt: parseFloat(document.getElementById('iVT').value) || 0,
            int: parseFloat(document.getElementById('iNT').value) || 0,
            evt: parseFloat(document.getElementById('eVT').value) || 0,
            ent: parseFloat(document.getElementById('eNT').value) || 0,
            h: parseFloat(document.getElementById('hep').value) || 0
        };
        db.push(entry);
        db.sort((a,b) => new Date(a.date) - new Date(b.date));
        localStorage.setItem('solar_v15', JSON.stringify(db));
        alert("Spremljeno!");
        renderGraphUnos();
    }

    function renderGraphUnos() {
        const cont = document.getElementById('graph-unos');
        cont.innerHTML = '';
        const last7 = db.slice(-7);
        const max = Math.max(...last7.map(x => x.p), 1);
        last7.forEach(x => {
            const h = (x.p / max) * 100;
            cont.innerHTML += `<div class="v-bar" style="height:${h}%; background:var(--solar);"><span class="v-label">${x.date.slice(8)}</span></div>`;
        });
    }

    function renderArchive() {
        const list = document.getElementById('archiveList');
        list.innerHTML = '';
        [...db].reverse().forEach(r => {
            list.innerHTML += `
                <div class="archive-line">
                    <input type="checkbox" class="cb" data-id="${r.id}">
                    <strong style="margin-left:5px;">${r.date.slice(5)}</strong>
                    <div class="archive-data">
                        <span style="color:var(--solar)">P:${r.p}</span>
                        <span style="color:var(--red)">U:${r.ivt+r.int}</span>
                        <span style="color:var(--green)">I:${r.evt+r.ent}</span>
                        <span>H:${r.h}€</span>
                    </div>
                </div>`;
        });
    }

    function renderAllStats() {
        const todayStr = new Date().toISOString().split('T')[0];
        const monthStr = todayStr.slice(0, 7);
        const yearStr = todayStr.slice(0, 4);

        const getSums = (filter) => {
            return db.filter(r => r.date.startsWith(filter)).reduce((a, b) => ({
                p: a.p + b.p, i: a.i + (b.ivt+b.int), e: a.e + (b.evt+b.ent)
            }), {p:0, i:0, e:0});
        };

        const d = getSums(todayStr); const m = getSums(monthStr); const y = getSums(yearStr);

        const drawStat = (id, vals, color) => {
            const cont = document.getElementById(id);
            const max = Math.max(vals.p, vals.i, vals.e, 1);
            cont.innerHTML = `
                <div class="v-bar" style="height:${(vals.p/max)*100}%; background:${color};"><span class="v-label">DAN</span></div>
                <div class="v-bar" style="height:${(vals.i/max)*100}%; background:${color}; opacity:0.7;"><span class="v-label">MJES</span></div>
                <div class="v-bar" style="height:${(vals.e/max)*100}%; background:${color}; opacity:0.4;"><span class="v-label">GOD</span></div>`;
        };

        drawStat('stat-graph-p', {p:d.p, i:m.p, e:y.p}, 'var(--solar)');
        drawStat('stat-graph-i', {p:d.i, i:m.i, e:y.i}, 'var(--red)');
        drawStat('stat-graph-e', {p:d.e, i:m.e, e:y.e}, 'var(--green)');
    }

    function renderROI() {
        const totalP = db.reduce((a, b) => a + b.p, 0);
        const saved = totalP * cfg.vt;
        const p = (saved / cfg.inv * 100).toFixed(1);
        document.getElementById('roiTotal').innerText = saved.toFixed(2) + " €";
        document.getElementById('roiFill').style.width = Math.min(p, 100) + "%";
        document.getElementById('roiPerc').innerText = p + "% Isplaćeno | Preostalo: " + (cfg.inv - saved).toFixed(2) + " €";
    }

    function saveCfg() {
        cfg = { inv: parseFloat(document.getElementById('cfgInv').value), vt: parseFloat(document.getElementById('cfgVT').value), nt: parseFloat(document.getElementById('cfgNT').value), sell: parseFloat(document.getElementById('cfgSell').value) };
        localStorage.setItem('solar_cfg_v15', JSON.stringify(cfg));
        alert("Spremljeno!");
    }

    function deleteSelected() {
        const sel = Array.from(document.querySelectorAll('.cb:checked')).map(x => parseInt(x.dataset.id));
        if(sel.length && confirm("Obriši?")) {
            db = db.filter(r => !sel.includes(r.id));
            localStorage.setItem('solar_v15', JSON.stringify(db));
            renderArchive();
        }
    }

    document.getElementById('date').valueAsDate = new Date();
    document.getElementById('cfgInv').value = cfg.inv; document.getElementById('cfgVT').value = cfg.vt;
    document.getElementById('cfgNT').value = cfg.nt; document.getElementById('cfgSell').value = cfg.sell;
    renderGraphUnos();
</script>
</body>
</html>
