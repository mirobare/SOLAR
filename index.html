<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Monitor Ultra - Charts Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e7eb; font-family: sans-serif; }
        .active-tab { border-top: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .hidden { display: none; }
        .dark-card { background-color: #171717; border: 1px solid #262626; border-radius: 1.5rem; }
        input { color-scheme: dark; }
        .bar-container { background: #262626; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .bar-value { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="pb-32 antialiased">

    <!-- HEADER -->
    <div class="bg-blue-950 p-6 text-white text-center shadow-2xl sticky top-0 z-40 border-b border-blue-900">
        <h1 class="text-xl font-black uppercase italic tracking-tighter text-blue-400">SOLAR MONITOR ☀️</h1>
        <p class="text-[10px] opacity-70 font-bold" id="current-date"></p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- TAB 1: UNOS -->
        <div id="tab-input" class="space-y-4">
            <div class="dark-card p-5 shadow-xl space-y-4 text-center">
                <div class="grid grid-cols-2 gap-3 text-left">
                    <div class="bg-blue-950/40 p-3 rounded-2xl border border-blue-900/50">
                        <label class="block text-[9px] font-black text-blue-400 uppercase italic text-center">1.8.1 (VT)</label>
                        <input type="number" id="in-vt" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                    </div>
                    <div class="bg-blue-950/40 p-3 rounded-2xl border border-blue-900/50">
                        <label class="block text-[9px] font-black text-blue-300 uppercase italic text-center">1.8.2 (NT)</label>
                        <input type="number" id="in-nt" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                    </div>
                    <div class="bg-green-950/40 p-3 rounded-2xl border border-green-900/50">
                        <label class="block text-[9px] font-black text-green-400 uppercase italic text-center">2.8.1 (VT)</label>
                        <input type="number" id="out-vt" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                    </div>
                    <div class="bg-green-950/40 p-3 rounded-2xl border border-green-900/50">
                        <label class="block text-[9px] font-black text-green-300 uppercase italic text-center">2.8.2 (NT)</label>
                        <input type="number" id="out-nt" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                    </div>
                </div>
                <div class="bg-orange-950/20 p-4 rounded-2xl border border-orange-900/50">
                    <label class="block text-[9px] font-black text-orange-400 uppercase italic text-center">Solar Inverter (kWh)</label>
                    <input type="number" id="sol-gen" class="w-full bg-transparent font-black text-2xl outline-none text-orange-500 text-center" placeholder="0.0">
                </div>
                <button onclick="saveData()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg uppercase italic tracking-widest transition-all active:scale-95">Spremi i Analiziraj</button>
            </div>
        </div>

        <!-- TAB 2: ARHIVA -->
        <div id="tab-archive" class="hidden space-y-3">
            <div id="history-list" class="space-y-3"></div>
            <button onclick="clearAll()" class="w-full text-[10px] text-red-900 font-bold uppercase pt-10">Obriši svu povijest</button>
        </div>

        <!-- TAB 3: STATISTIKA -->
        <div id="tab-stats" class="hidden space-y-4 text-center">
            <div class="dark-card p-5 border-t-4 border-blue-500">
                <p class="text-[10px] font-black text-gray-500 uppercase italic mb-6">Ukupna Bilanca & Grafikoni 📊</p>
                
                <div class="space-y-6 text-left">
                    <!-- Grid In Chart -->
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-[10px] font-bold text-blue-300 uppercase">Mreža (Potrošnja)</span>
                            <span id="total-grid-in" class="text-sm font-black text-blue-400">0.0 kWh</span>
                        </div>
                        <div class="bar-container"><div id="bar-grid-in" class="bar-value bg-blue-500" style="width: 0%"></div></div>
                    </div>

                    <!-- Grid Out Chart -->
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-[10px] font-bold text-green-300 uppercase">Višak (Poslano)</span>
                            <span id="total-grid-out" class="text-sm font-black text-green-400">0.0 kWh</span>
                        </div>
                        <div class="bar-container"><div id="bar-grid-out" class="bar-value bg-green-500" style="width: 0%"></div></div>
                    </div>

                    <!-- Solar Gen Chart -->
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-[10px] font-bold text-orange-400 uppercase">Solar (Ukupno)</span>
                            <span id="total-solar-gen" class="text-sm font-black text-orange-500">0.0 kWh</span>
                        </div>
                        <div class="bar-container"><div id="bar-solar" class="bar-value bg-orange-500" style="width: 0%"></div></div>
                    </div>

                    <div class="pt-4 mt-2 border-t border-gray-800 flex justify-between items-center">
                        <span class="text-xs font-black uppercase text-gray-400 italic">Neto Rezultat:</span>
                        <span id="net-total" class="text-2xl font-black text-white italic">0.0 kWh</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 4: POSTAVKE -->
        <div id="tab-settings" class="hidden">
            <div class="dark-card p-5 text-center">
                <p class="text-[10px] font-black uppercase text-gray-500">Solar Monitor v1.9</p>
                <p class="text-[10px] text-gray-600 mt-2 italic">Podaci se spremaju lokalno na vaš uređaj.</p>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#121212] border-t border-gray-800 pb-8 pt-2 px-6 flex justify-between items-center z-50">
        <button onclick="switchTab('input')" id="btn-input" class="flex flex-col items-center gap-1 active-tab">
            <span class="text-xl">📝</span>
            <span class="text-[10px] uppercase font-black italic">Unos</span>
        </button>
        <button onclick="switchTab('archive')" id="btn-archive" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="text-xl">📂</span>
            <span class="text-[10px] uppercase font-black italic">Arhiva</span>
        </button>
        <button onclick="switchTab('stats')" id="btn-stats" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="text-xl">📊</span>
            <span class="text-[10px] uppercase font-black italic">Stats</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-settings" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="text-xl">⚙️</span>
            <span class="text-[10px] uppercase font-black italic">Set</span>
        </button>
    </nav>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('hr-HR');
        let solarData = JSON.parse(localStorage.getItem('solar_history')) || [];

        function switchTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active-tab');
                btn.classList.add('text-gray-500');
            });
            document.getElementById('btn-' + tab).classList.add('active-tab');
            document.getElementById('btn-' + tab).classList.remove('text-gray-500');
            
            if(tab === 'archive') renderArchive();
            if(tab === 'stats') calculateStats();
        }

        function saveData() {
            // FIX: Osiguravamo da su vrijednosti brojevi (ako je polje prazno, postaje 0)
            const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;

            const entry = {
                date: new Date().toLocaleString('hr-HR', {day:'2.digit', month:'2.digit', year:'numeric', hour:'2.digit', minute:'2.digit'}),
                invt: getVal('in-vt'),
                innt: getVal('in-nt'),
                outvt: getVal('out-vt'),
                outnt: getVal('out-nt'),
                solar: getVal('sol-gen')
            };

            solarData.push(entry);
            localStorage.setItem('solar_history', JSON.stringify(solarData));
            
            // Očisti polja nakon spremanja
            ['in-vt','in-nt','out-vt','out-nt','sol-gen'].forEach(id => document.getElementById(id).value = '');
            
            alert('Podaci uspješno analizirani i spremljeni!');
            switchTab('archive');
        }

        function renderArchive() {
            const list = document.getElementById('history-list');
            list.innerHTML = solarData.length ? '' : '<p class="text-center text-gray-600 text-xs py-10 italic">Nema spremljenih podataka...</p>';
            
            solarData.slice().reverse().forEach(item => {
                const totalIn = (item.invt + item.innt).toFixed(1);
                const totalOut = (item.outvt + item.outnt).toFixed(1);
                list.innerHTML += `
                    <div class="dark-card p-4 border-l-4 border-blue-500 flex justify-between items-center shadow-md">
                        <div>
                            <p class="text-[9px] font-bold text-gray-500 uppercase">${item.date}</p>
                            <p class="text-sm font-black italic">Mreža: <span class="text-blue-400">${totalIn} kWh</span></p>
                            <p class="text-[10px] font-bold text-green-500">Vraćeno: ${totalOut} kWh</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-gray-500">INVERTER</p>
                            <p class="text-lg font-black italic text-orange-500">${item.solar.toFixed(1)} <span class="text-[10px]">kWh</span></p>
                        </div>
                    </div>`;
            });
        }

        function calculateStats() {
            let tIn = 0, tOut = 0, tSolar = 0;

            solarData.forEach(item => {
                tIn += (item.invt + item.innt);
                tOut += (item.outvt + item.outnt);
                tSolar += item.solar;
            });

            // Ispis brojčanih vrijednosti
            document.getElementById('total-grid-in').innerText = tIn.toFixed(1) + ' kWh';
            document.getElementById('total-grid-out').innerText = tOut.toFixed(1) + ' kWh';
            document.getElementById('total-solar-gen').innerText = tSolar.toFixed(1) + ' kWh';
            document.getElementById('net-total').innerText = (tOut - tIn).toFixed(1) + ' kWh';

            // Vizualizacija grafikona (proporcionalno najvećoj vrijednosti)
            const maxVal = Math.max(tIn, tOut, tSolar, 1); // Izbjegavanje dijeljenja s nulom
            document.getElementById('bar-grid-in').style.width = (tIn / maxVal * 100) + '%';
            document.getElementById('bar-grid-out').style.width = (tOut / maxVal * 100) + '%';
            document.getElementById('bar-solar').style.width = (tSolar / maxVal * 100) + '%';
        }

        function clearAll() {
            if(confirm('Jeste li sigurni da želite obrisati cijelu arhivu?')) {
                localStorage.removeItem('solar_history');
                solarData = [];
                renderArchive();
            }
        }
    </script>
</body>
</html>
