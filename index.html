<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v29 - FINAL</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .tab-content.active { display: block; }

        /* UNOS */
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; position: relative; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 12px; border-bottom: 3px solid #444; }
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: block; }
        input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; outline: none; font-weight: bold; }
        
        .live-graph { display: flex; align-items: flex-end; gap: 8px; height: 100px; background: #111; padding: 15px 10px; border-radius: 12px; border: 1px solid #333; margin-top: 15px; }
        .v-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 2px; position: relative; transition: height 0.3s; }
        .v-label { position: absolute; bottom: -18px; width: 100%; text-align: center; font-size: 0.5rem; color: var(--gray); font-weight: bold; }

        /* ARHIVA - DETALJAN PRIKAZ S BOJAMA */
        .archive-line { display: flex; align-items: center; background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--solar); overflow: hidden; }
        .arch-date { font-size: 0.8rem; font-weight: bold; min-width: 75px; color: var(--accent); }
        .arch-scroll-area { display: flex; gap: 15px; overflow-x: auto; flex: 1; padding: 0 10px; scrollbar-width: none; }
        .arch-scroll-area::-webkit-scrollbar { display: none; }
        .arch-data-block { display: flex; flex-direction: column; white-space: nowrap; min-width: 60px; }
        .arch-lbl { font-size: 0.55rem; color: var(--gray); text-transform: uppercase; margin-bottom: 2px; }
        .arch-num { font-size: 0.85rem; font-weight: bold; }
        .arch-sub { font-size: 0.65rem; opacity: 0.8; margin-top: 1px; }
        .del-btn-mini { background: #333; color: var(--red); border: none; padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; margin-left: 5px; }

        /* STATISTIKA */
        .energy-bar-container { display: flex; height: 35px; background: #111; border-radius: 8px; overflow: hidden; margin: 15px 0; border: 1px solid #333; }
        .energy-segment { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: bold; color: #fff; }

        /* POSTAVKE */
        .set-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px; background: #2c2c2e; border-radius: 8px; }
        .set-row input { width: 80px; text-align: right; border-bottom: 1px solid var(--accent); font-size: 0.9rem; color: #fff; background: transparent; border-top:none; border-left:none; border-right:none; outline:none; }

        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .exp-btn { background: #2c2c2e; color: var(--green); border: 1px solid var(--green); padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="swTab('unos', this)">Unos</button>
        <button class="nav-btn" onclick="swTab('arhiva', this)">Arhiva</button>
        <button class="nav-btn" onclick="swTab('stat', this)">Statistika</button>
        <button class="nav-btn" onclick="swTab('postavke', this)">Postavke</button>
    </nav>

    <!-- UNOS -->
    <div id="unos" class="tab-content active">
        <div class="card">
            <div class="input-row" style="grid-template-columns: 1fr;"><div class="input-box" style="border-color:var(--accent)"><label>Datum</label><input type="date" id="date"></div></div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz VT</label><input type="number" id="ivt" oninput="lUpd()"></div>
                <div class="input-box" style="border-color:var(--red)"><label>Uvoz NT</label><input type="number" id="int" oninput="lUpd()"></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz VT</label><input type="number" id="evt" oninput="lUpd()"></div>
                <div class="input-box" style="border-color:var(--green)"><label>Izvoz NT</label><input type="number" id="ent" oninput="lUpd()"></div>
            </div>
            <div class="input-row">
                <div class="input-box" style="border-color:var(--solar)"><label>Solari (kWh)</label><input type="number" id="prod" oninput="lUpd()"></div>
                <div class="input-box" style="border-color:#fff"><label>HEP (€)</label><input type="number" id="hep"></div>
            </div>
            <button class="main-btn" onclick="sData()">SPREMI UNOS</button>
        </div>
        <div class="live-graph">
            <div class="v-bar" id="b-ivt" style="background:var(--red)"><span class="v-label">U-VT</span></div>
            <div class="v-bar" id="b-int" style="background:var(--red); opacity:0.7"><span class="v-label">U-NT</span></div>
            <div class="v-bar" id="b-evt" style="background:var(--green)"><span class="v-label">X-VT</span></div>
            <div class="v-bar" id="b-ent" style="background:var(--green); opacity:0.7"><span class="v-label">X-NT</span></div>
            <div class="v-bar" id="b-prod" style="background:var(--solar)"><span class="v-label">SOLAR</span></div>
        </div>
    </div>

    <!-- ARHIVA -->
    <div id="arhiva" class="tab-content"><div id="archiveList"></div></div>

    <!-- STATISTIKA -->
    <div id="stat" class="tab-content">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="nav-btn" id="btn-dan" onclick="rStat('dan', this)">DAN</button>
            <button class="nav-btn" id="btn-mjesec" onclick="rStat('mjesec', this)">MJESEC</button>
            <button class="nav-btn" id="btn-godina" onclick="rStat('godina', this)">GODINA</button>
            <button class="nav-btn active" id="btn-ukupno" onclick="rStat('ukupno', this)">UKUPNO</button>
        </div>
        <div id="statOutput"></div>
    </div>

    <!-- POSTAVKE -->
    <div id="postavke" class="tab-content">
        <div class="card">
            <label style="color:var(--accent); margin-bottom:10px; display:block;">CIJENE (€/kWh)</label>
            <div class="set-row"><span>Uvoz VT</span><input type="number" step="0.001" id="c_ivt" onchange="saveSettings()"></div>
            <div class="set-row"><span>Uvoz NT</span><input type="number" step="0.001" id="c_int" onchange="saveSettings()"></div>
            <div class="set-row"><span>Izvoz VT</span><input type="number" step="0.001" id="c_evt" onchange="saveSettings()"></div>
            <div class="set-row"><span>Izvoz NT</span><input type="number" step="0.001" id="c_ent" onchange="saveSettings()"></div>
            <div class="set-row"><span>Investicija (€)</span><input type="number" id="c_inv" onchange="saveSettings()"></div>
        </div>
        <div id="isplativostOutput"></div>
        <button class="exp-btn" onclick="exportXML()">IZVEZI XML</button>
        <button class="exp-btn" style="color:var(--red); border-color:var(--red);" onclick="clearDB()">OBRIŠI SVE</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('solarDB')) || [];
        let set = JSON.parse(localStorage.getItem('solarSet')) || { ivt: 0.16, int: 0.08, evt: 0.04, ent: 0.04, inv: 0 };
        const mjNames = ["Siječanj", "Veljača", "Ožujak", "Travanj", "Svibanj", "Lipanj", "Srpanj", "Kolovoz", "Rujan", "Listopad", "Studeni", "Prosinac"];
        
        document.getElementById('date').valueAsDate = new Date();

        function swTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'arhiva') rArchive();
            if(id === 'stat') rStat('ukupno', document.getElementById('btn-ukupno'));
            if(id === 'postavke') loadSettings();
        }

        function loadSettings() {
            document.getElementById('c_ivt').value = set.ivt;
            document.getElementById('c_int').value = set.int;
            document.getElementById('c_evt').value = set.evt;
            document.getElementById('c_ent').value = set.ent;
            document.getElementById('c_inv').value = set.inv;
            calcROI();
        }

        function saveSettings() {
            set = {
                ivt: parseFloat(document.getElementById('c_ivt').value) || 0,
                int: parseFloat(document.getElementById('c_int').value) || 0,
                evt: parseFloat(document.getElementById('c_evt').value) || 0,
                ent: parseFloat(document.getElementById('c_ent').value) || 0,
                inv: parseFloat(document.getElementById('c_inv').value) || 0
            };
            localStorage.setItem('solarSet', JSON.stringify(set));
            calcROI();
        }

        function lUpd() {
            const v = { ivt: parseFloat(document.getElementById('ivt').value) || 0, int: parseFloat(document.getElementById('int').value) || 0, evt: parseFloat(document.getElementById('evt').value) || 0, ent: parseFloat(document.getElementById('ent').value) || 0, prod: parseFloat(document.getElementById('prod').value) || 0 };
            const max = Math.max(v.ivt, v.int, v.evt, v.ent, v.prod, 1);
            ['ivt','int','evt','ent','prod'].forEach(k => document.getElementById('b-'+k).style.height = (v[k]/max * 100) + "px");
        }

        function sData() {
            const entry = { id: Date.now(), date: document.getElementById('date').value, ivt: parseFloat(document.getElementById('ivt').value) || 0, int: parseFloat(document.getElementById('int').value) || 0, evt: parseFloat(document.getElementById('evt').value) || 0, ent: parseFloat(document.getElementById('ent').value) || 0, prod: parseFloat(document.getElementById('prod').value) || 0, hep: parseFloat(document.getElementById('hep').value) || 0 };
            db.push(entry);
            localStorage.setItem('solarDB', JSON.stringify(db));
            alert("Podaci spremljeni!");
        }

        function rArchive() {
            const list = document.getElementById('archiveList');
            list.innerHTML = db.slice().reverse().map(i => {
                const u_total = i.ivt + i.int;
                const x_total = i.evt + i.ent;
                const u_euro = (i.ivt * set.ivt) + (i.int * set.int);
                const x_euro = (i.evt * set.evt) + (i.ent * set.ent);
                
                return `
                <div class="archive-line">
                    <div class="arch-date">${i.date.split('-').reverse().slice(0,2).join('.')}</div>
                    <div class="arch-scroll-area">
                        <div class="arch-data-block">
                            <span class="arch-lbl">Uvoz (VT/NT)</span>
                            <span class="arch-num" style="color:var(--red)">${u_total.toFixed(1)} <small>kWh</small></span>
                            <span class="arch-sub" style="color:var(--red)">${u_euro.toFixed(2)}€</span>
                        </div>
                        <div class="arch-data-block">
                            <span class="arch-lbl">Izvoz (VT/NT)</span>
                            <span class="arch-num" style="color:var(--green)">${x_total.toFixed(1)} <small>kWh</small></span>
                            <span class="arch-sub" style="color:var(--green)">${x_euro.toFixed(2)}€</span>
                        </div>
                        <div class="arch-data-block">
                            <span class="arch-lbl">Solar</span>
                            <span class="arch-num" style="color:var(--solar)">${i.prod.toFixed(1)} <small>kWh</small></span>
                        </div>
                        <div class="arch-data-block">
                            <span class="arch-lbl">HEP Račun</span>
                            <span class="arch-num" style="color:#fff">${i.hep.toFixed(2)} <small>€</small></span>
                        </div>
                    </div>
                    <button class="del-btn-mini" onclick="delItem(${i.id})">X</button>
                </div>`;
            }).join('');
        }

        function rStat(filter, btn) {
            document.querySelectorAll('#stat .nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const now = new Date();
            let filtered = db.filter(i => {
                const d = new Date(i.date);
                if(filter === 'dan') return d.toDateString() === now.toDateString();
                if(filter === 'mjesec') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if(filter === 'godina') return d.getFullYear() === now.getFullYear();
                return true;
            });

            const sum = filtered.reduce((a, c) => { a.ivt += c.ivt; a.int += c.int; a.evt += c.evt; a.ent += c.ent; a.prod += c.prod; a.hep += c.hep; return a; }, {ivt:0, int:0, evt:0, ent:0, prod:0, hep:0});
            const total = sum.ivt + sum.int + sum.evt + sum.ent + sum.prod || 1;
            
            let title = filter.toUpperCase();
            if(filter === 'mjesec') title = mjNames[now.getMonth()] + " " + now.getFullYear();
            if(filter === 'godina') title = "GODINA " + now.getFullYear();

            document.getElementById('statOutput').innerHTML = `
                <div class="card">
                    <div style="font-weight:bold; color:var(--accent); margin-bottom:10px;">${title}</div>
                    <div class="energy-bar-container">
                        <div class="energy-segment" style="width:${(sum.ivt/total*100)}%; background:var(--red);">${sum.ivt.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.int/total*100)}%; background:var(--red); opacity:0.6;">${sum.int.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.evt/total*100)}%; background:var(--green);">${sum.evt.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.ent/total*100)}%; background:var(--green); opacity:0.6;">${sum.ent.toFixed(0)}</div>
                        <div class="energy-segment" style="width:${(sum.prod/total*100)}%; background:var(--solar);">${sum.prod.toFixed(0)}</div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.7rem; margin-top:10px;">
                        <div>Uvoz: ${(sum.ivt*set.ivt + sum.int*set.int).toFixed(2)}€</div>
                        <div>Izvoz: ${(sum.evt*set.evt + sum.ent*set.ent).toFixed(2)}€</div>
                        <div style="color:var(--solar)">Solar: ${sum.prod.toFixed(1)} kWh</div>
                        <div style="color:var(--accent)">Ukupno HEP: ${sum.hep.toFixed(2)}€</div>
                    </div>
                </div>
            `;
        }

        function calcROI() {
            const benefit = db.reduce((a, c) => a + (c.evt*set.evt + c.ent*set.ent) + (c.prod - (c.evt+c.ent))*set.ivt, 0);
            const perc = set.inv > 0 ? (benefit / set.inv * 100).toFixed(1) : 0;
            document.getElementById('isplativostOutput').innerHTML = `
                <div class="card" style="border-color:var(--green)">
                    <label style="color:var(--green)">ISPLATIVOST INVESTICIJE</label>
                    <div style="font-size:1.2rem; font-weight:bold; margin-top:5px;">${benefit.toFixed(2)} € / ${set.inv} €</div>
                    <div style="background:#111; height:12px; border-radius:6px; margin-top:10px; overflow:hidden;">
                        <div style="background:var(--green); width:${Math.min(perc,100)}%; height:100%;"></div>
                    </div>
                    <div style="text-align:right; font-size:0.65rem; margin-top:5px;">Otplaćeno: ${perc}%</div>
                </div>`;
        }

        function exportXML() {
            let xml = '<?xml version="1.0" encoding="UTF-8"?><solar_arhiva>';
            db.forEach(i => {
                xml += `<unos><id>${i.id}</id><datum>${i.date}</datum><ivt>${i.ivt}</ivt><int>${i.int}</int><evt>${i.evt}</evt><ent>${i.ent}</ent><solar>${i.prod}</solar><hep>${i.hep}</hep></unos>`;
            });
            xml += '</solar_arhiva>';
            const blob = new Blob([xml], {type:'application/xml'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'solar_arhiva.xml'; a.click();
        }

        function delItem(id) { if(confirm("Obrisati ovaj unos?")) { db = db.filter(i => i.id !== id); localStorage.setItem('solarDB', JSON.stringify(db)); rArchive(); } }
        function clearDB() { if(confirm("Obrisati CIJELU bazu podataka?")) { localStorage.clear(); db=[]; location.reload(); } }
    </script>
</body>
</html>
