<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Pro v29 - FINAL</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0A84FF; --solar: #FF9F0A; --green: #32D74B; --red: #FF453A; --text: #fff; --gray: #8e8e93; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        
        .nav-tabs { display: flex; background: #1c1c1e; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: var(--gray); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .tab-content.active { display: block; }

        /* UNOS & ARHIVA */
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; position: relative; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-box { background: #2c2c2e; padding: 10px; border-radius: 12px; border-bottom: 3px solid #444; }
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { background: transparent; border: none; color: #fff; font-size: 1.1rem; width: 100%; outline: none; font-weight: bold; }
        
        .archive-line { display: flex; align-items: center; background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid var(--solar); }
        .arch-scroll-area { display: flex; gap: 12px; overflow-x: auto; flex: 1; padding: 0 10px; scrollbar-width: none; }
        .arch-data-block { display: flex; flex-direction: column; white-space: nowrap; }
        .arch-lbl { font-size: 0.55rem; color: var(--gray); text-transform: uppercase; }
        .arch-num { font-size: 0.75rem; font-weight: bold; }

        /* ANALIZA */
        .energy-bar-container { display: flex; height: 35px; background: #111; border-radius: 8px; overflow: hidden; margin: 10px 0; border: 1px solid #333; }
        .energy-segment { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: bold; color: #000; }

        /* POSTAVKE */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .set-box { background: #1c1c1e; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .set-box input { font-size: 0.9rem; border-bottom: 1px solid var(--accent); width: 80%; }
        
        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; }
        .exp-btn { background: #2c2c2e; color: var(--green); border: 1px solid var(--green); padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="swTab('unos', this)">Unos</button>
        <button class="nav-btn" onclick="swTab('arhiva', this)">Arhiva</button>
        <button class="nav-btn" onclick="swTab('stat', this)">Analiza</button>
        <button class="nav-btn" onclick="swTab('postavke', this)">Postavke</button>
    </nav>

    <!-- UNOS -->
    <div id="unos" class="tab-content active">
        <div class="card">
            <div class="input-row" style="grid-template-columns: 1fr;"><div class="input-box"><label>Datum</label><input type="date" id="date"></div></div>
            <div class="input-row">
                <div class="input-box"><label>Uvoz VT</label><input type="number" id="ivt"></div>
                <div class="input-box"><label>Uvoz NT</label><input type="number" id="int"></div>
            </div>
            <div class="input-row">
                <div class="input-box"><label>Izvoz VT</label><input type="number" id="evt"></div>
                <div class="input-box"><label>Izvoz NT</label><input type="number" id="ent"></div>
            </div>
            <div class="input-row">
                <div class="input-box"><label>Solari (kWh)</label><input type="number" id="prod"></div>
                <div class="input-box"><label>HEP (€)</label><input type="number" id="hep"></div>
            </div>
            <button class="main-btn" onclick="sData()">SPREMI UNOS</button>
        </div>
    </div>

    <!-- ARHIVA -->
    <div id="arhiva" class="tab-content"><div id="archiveList"></div></div>

    <!-- ANALIZA -->
    <div id="stat" class="tab-content">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="nav-btn" style="border:1px solid #333; border-radius:8px;" onclick="rStat('dan')">DAN</button>
            <button class="nav-btn" style="border:1px solid #333; border-radius:8px;" onclick="rStat('mjesec')">MJESEC</button>
            <button class="nav-btn" style="border:1px solid #333; border-radius:8px;" onclick="rStat('ukupno')">UKUPNO</button>
        </div>
        <div id="statOutput"></div>
    </div>

    <!-- POSTAVKE -->
    <div id="postavke" class="tab-content">
        <div class="card">
            <div style="color:var(--accent); font-weight:bold; margin-bottom:15px;">POSTAVKE CIJENA (€/kWh)</div>
            <div class="settings-grid">
                <div class="set-box"><label>Uvoz VT</label><input type="number" step="0.001" id="p_ivt" onchange="sSet()"></div>
                <div class="set-box"><label>Uvoz NT</label><input type="number" step="0.001" id="p_int" onchange="sSet()"></div>
                <div class="set-box"><label>Izvoz VT</label><input type="number" step="0.001" id="p_evt" onchange="sSet()"></div>
                <div class="set-box"><label>Izvoz NT</label><input type="number" step="0.001" id="p_ent" onchange="sSet()"></div>
            </div>
            <div class="set-box" style="width:100%; box-sizing:border-box;"><label>Ukupna investicija (€)</label><input type="number" id="p_inv" onchange="sSet()"></div>
        </div>

        <div id="roiBox"></div>

        <button class="exp-btn" onclick="exportCSV()">IZVEZI CSV (EXCEL)</button>
        <button class="exp-btn" style="color:var(--accent); border-color:var(--accent);" onclick="exportXML()">IZVEZI XML</button>
        <button class="exp-btn" style="color:var(--red); border-color:var(--red); margin-top:20px;" onclick="clearDB()">OBRIŠI SVE PODATKE</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('solarDB')) || [];
        let set = JSON.parse(localStorage.getItem('solarSet')) || {ivt:0.16, int:0.08, evt:0.04, ent:0.04, inv:0};
        document.getElementById('date').valueAsDate = new Date();

        function sSet() {
            set = {
                ivt: parseFloat(document.getElementById('p_ivt').value) || 0,
                int: parseFloat(document.getElementById('p_int').value) || 0,
                evt: parseFloat(document.getElementById('p_evt').value) || 0,
                ent: parseFloat(document.getElementById('p_ent').value) || 0,
                inv: parseFloat(document.getElementById('p_inv').value) || 0
            };
            localStorage.setItem('solarSet', JSON.stringify(set));
            rROI();
        }

        function loadSet() {
            document.getElementById('p_ivt').value = set.ivt;
            document.getElementById('p_int').value = set.int;
            document.getElementById('p_evt').value = set.evt;
            document.getElementById('p_ent').value = set.ent;
            document.getElementById('p_inv').value = set.inv;
        }

        function swTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'arhiva') rArchive();
            if(id === 'stat') rStat('mjesec');
            if(id === 'postavke') { loadSet(); rROI(); }
        }

        function sData() {
            const entry = { id: Date.now(), date: document.getElementById('date').value, ivt: parseFloat(document.getElementById('ivt').value) || 0, int: parseFloat(document.getElementById('int').value) || 0, evt: parseFloat(document.getElementById('evt').value) || 0, ent: parseFloat(document.getElementById('ent').value) || 0, prod: parseFloat(document.getElementById('prod').value) || 0, hep: parseFloat(document.getElementById('hep').value) || 0 };
            db.push(entry);
            localStorage.setItem('solarDB', JSON.stringify(db));
            alert("Spremljeno!");
        }

        function rArchive() {
            const list = document.getElementById('archiveList');
            list.innerHTML = db.slice().reverse().map(i => `<div class="archive-line"><div style="font-weight:bold; color:var(--accent); min-width:60px;">${i.date.split('-').reverse().slice(0,2).join('.')}</div><div class="arch-scroll-area"><div class="arch-data-block"><span class="arch-lbl">Uvoz</span><span class="arch-num">${(i.ivt+i.int).toFixed(1)}</span></div><div class="arch-data-block"><span class="arch-lbl">Izvoz</span><span class="arch-num">${(i.evt+i.ent).toFixed(1)}</span></div><div class="arch-data-block"><span class="arch-lbl">Solar</span><span class="arch-num">${i.prod}</span></div></div><button style="color:var(--red); border:none; background:none;" onclick="delItem(${i.id})">X</button></div>`).join('');
        }

        function rStat(filter) {
            let filtered = db; // Primjer skraćen za pregled
            const sum = filtered.reduce((a, c) => { a.ivt += c.ivt; a.int += c.int; a.evt += c.evt; a.ent += c.ent; a.prod += c.prod; a.hep += c.hep; return a; }, {ivt:0, int:0, evt:0, ent:0, prod:0, hep:0});
            const total = sum.ivt + sum.int + sum.evt + sum.ent + sum.prod || 1;
            document.getElementById('statOutput').innerHTML = `<div class="card"><div class="energy-bar-container"><div class="energy-segment" style="width:${(sum.ivt/total*100)}%; background:var(--red);">${sum.ivt.toFixed(0)}</div><div class="energy-segment" style="width:${(sum.int/total*100)}%; background:var(--red); opacity:0.6;">${sum.int.toFixed(0)}</div><div class="energy-segment" style="width:${(sum.evt/total*100)}%; background:var(--green);">${sum.evt.toFixed(0)}</div><div class="energy-segment" style="width:${(sum.prod/total*100)}%; background:var(--solar);">${sum.prod.toFixed(0)}</div></div><div style="font-size:0.7rem; display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;"><span>Uvoz: ${(sum.ivt*set.ivt + sum.int*set.int).toFixed(2)}€</span><span>Izvoz: ${(sum.evt*set.evt + sum.ent*set.ent).toFixed(2)}€</span><span style="color:var(--solar)">Proizvedeno: ${sum.prod} kWh</span></div></div>`;
        }

        function rROI() {
            const totalEarnd = db.reduce((a, c) => a + (c.evt*set.evt + c.ent*set.ent), 0);
            const totalSaved = db.reduce((a, c) => a + (c.prod - (c.evt+c.ent)) * set.ivt, 0); // Procjena uštede na vlastitoj potrošnji
            const totalBenefit = totalEarnd + totalSaved;
            const remaining = set.inv - totalBenefit;
            const perc = set.inv > 0 ? (totalBenefit / set.inv * 100).toFixed(1) : 0;

            document.getElementById('roiBox').innerHTML = `
                <div class="card" style="border-color:var(--green)">
                    <div style="color:var(--green); font-weight:bold; margin-bottom:10px;">ANALIZA ISPLATIVOSTI</div>
                    <div style="font-size:0.8rem; margin-bottom:5px;">Ukupna korist (Ušteda + Izvoz): <b>${totalBenefit.toFixed(2)} €</b></div>
                    <div style="font-size:0.8rem; margin-bottom:5px;">Preostalo za otplatu: <b>${remaining.toFixed(2)} €</b></div>
                    <div style="background:#111; height:15px; border-radius:10px; margin-top:10px; overflow:hidden;">
                        <div style="background:var(--green); width:${Math.min(perc, 100)}%; height:100%; transition:width 0.5s;"></div>
                    </div>
                    <div style="text-align:right; font-size:0.65rem; margin-top:5px;">Otplaćeno: ${perc}%</div>
                </div>
            `;
        }

        function exportXML() {
            let xml = '<?xml version="1.0" encoding="UTF-8"?><solar_database>';
            db.forEach(i => { xml += `<entry><id>${i.id}</id><date>${i.date}</date><ivt>${i.ivt}</ivt><int>${i.int}</int><evt>${i.evt}</evt><ent>${i.ent}</ent><prod>${i.prod}</prod><hep>${i.hep}</hep></entry>`; });
            xml += '</solar_database>';
            const blob = new Blob([xml], {type:'application/xml'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'solar_arhiva.xml'; a.click();
        }

        function exportCSV() {
            let csv = "Datum,Uvoz VT,Uvoz NT,Izvoz VT,Izvoz NT,Solar,HEP\n";
            db.forEach(i => { csv += `${i.date},${i.ivt},${i.int},${i.evt},${i.ent},${i.prod},${i.hep}\n`; });
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'solar.csv'; a.click();
        }
        function delItem(id) { if(confirm("Obrisati?")) { db = db.filter(i => i.id !== id); localStorage.setItem('solarDB', JSON.stringify(db)); rArchive(); } }
        function clearDB() { if(confirm("Obriši sve?")) { localStorage.clear(); db=[]; location.reload(); } }
    </script>
</body>
</html>
