<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Monitor Ultra Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-top: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        .hidden { display: none; }
        .bar-fill { transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); min-height: 4px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
    </style>
</head>
<body class="bg-gray-50 pb-28 text-gray-800 antialiased">

    <!-- HEADER -->
    <div class="bg-blue-900 p-6 text-white text-center shadow-lg sticky top-0 z-40">
        <h1 id="header-title" class="text-xl font-black uppercase italic tracking-tighter text-center">UNOS PODATAKA 📝</h1>
        <p class="text-[10px] opacity-70 font-bold text-center" id="current-date"></p>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- TAB 1: UNOS -->
        <div id="tab-input" class="space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-200 space-y-4">
                <div class="grid grid-cols-2 gap-3 text-center">
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <label class="block text-[9px] font-black text-blue-600 uppercase italic">1.8.1 (VT)</label>
                        <input type="number" id="in-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                        <span id="eur-in-vt" class="text-[10px] font-black text-blue-400">0.00 €</span>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <label class="block text-[9px] font-black text-blue-400 uppercase italic">1.8.2 (NT)</label>
                        <input type="number" id="in-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                        <span id="eur-in-nt" class="text-[10px] font-black text-blue-300">0.00 €</span>
                    </div>
                    <div class="bg-green-50 p-3 rounded-2xl border border-green-100 text-center">
                        <label class="block text-[9px] font-black text-green-700 uppercase italic">2.8.1 (VT)</label>
                        <input type="number" id="out-vt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                        <span id="eur-out-vt" class="text-[10px] font-black text-green-600">0.00 €</span>
                    </div>
                    <div class="bg-green-50 p-3 rounded-2xl border border-green-100 text-center">
                        <label class="block text-[9px] font-black text-green-500 uppercase italic">2.8.2 (NT)</label>
                        <input type="number" id="out-nt" oninput="liveCalc()" class="w-full bg-transparent font-bold text-lg outline-none text-center" placeholder="0">
                        <span id="eur-out-nt" class="text-[10px] font-black text-green-400">0.00 €</span>
                    </div>
                </div>
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                    <label class="block text-[9px] font-black text-orange-600 uppercase italic text-center">Solar Inverter (kWh)</label>
                    <input type="number" id="sol-gen" oninput="liveCalc()" class="w-full bg-transparent font-black text-2xl outline-none text-orange-700 text-center" placeholder="0.0">
                </div>
                <button onclick="processData()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase italic tracking-widest active:scale-95 transition-all">Spremi i Analiziraj</button>
            </div>

            <div id="chart-section" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center">
                <div class="flex items-end justify-between h-40 px-2 border-b-2 border-gray-100 mb-4">
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-1" class="bar-fill w-full bg-blue-600 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">1.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-2" class="bar-fill w-full bg-blue-400 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">1.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-3" class="bar-fill w-full bg-green-600 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">2.8.1</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-4" class="bar-fill w-full bg-green-400 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2">2.8.2</span></div>
                    <div class="flex flex-col items-center w-[18%] h-full justify-end"><div id="bar-5" class="bar-fill w-full bg-orange-500 rounded-t-md" style="height: 0%"></div><span class="text-[8px] font-black mt-2 italic text-orange-600 uppercase">SOL</span></div>
                </div>
                <div id="final-summary" class="text-center text-xl font-black italic"></div>
            </div>
        </div>

        <!-- TAB 2: ARHIVA -->
        <div id="tab-archive" class="hidden space-y-3 pb-10">
            <div class="flex justify-between items-center px-2 mb-2">
                <div class="flex gap-2">
                    <button onclick="exportData()" class="bg-blue-100 text-blue-600 text-[9px] font-black px-3 py-2 rounded-full uppercase">☁️ Export</button>
                    <label class="bg-gray-100 text-gray-600 text-[9px] font-black px-3 py-2 rounded-full uppercase cursor-pointer">
                        📂 Import <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                    </label>
                </div>
                <button onclick="deleteSelected()" id="del-btn" class="hidden bg-red-100 text-red-600 text-[9px] font-black px-4 py-2 rounded-full uppercase">Obriši</button>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- TAB 3: STATISTIKA -->
        <div id="tab-stats" class="hidden space-y-6">
            <div id="stats-current" class="space-y-4"></div>
            <div class="border-t border-dashed pt-4">
                <h2 class="text-[10px] font-black text-gray-400 uppercase italic mb-4 text-center">Povijest po mjesecima</h2>
                <div id="stats-history" class="space-y-4"></div>
            </div>
        </div>

        <!-- TAB 4: POSTAVKE -->
        <div id="tab-settings" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm text-center">
                <h2 class="font-black text-gray-700 uppercase text-xs border-b pb-2 mb-6 italic">Cijene s PDV-om (€/kWh)</h2>
                <div class="space-y-5 text-sm font-bold text-gray-600">
                    <div class="flex justify-between border-b pb-2"><span>VT Kupnja (1.8.1)</span><input type="number" id="p-vt" step="0.001" class="w-20 text-right outline-none font-black text-blue-600" value="0.16"></div>
                    <div class="flex justify-between border-b pb-2"><span>NT Kupnja (1.8.2)</span><input type="number" id="p-nt" step="0.001" class="w-20 text-right outline-none font-black text-blue-400" value="0.08"></div>
                    <div class="flex justify-between border-b pb-2"><span>Otkup viška (2.8.x)</span><input type="number" id="p-out" step="0.001" class="w-20 text-right outline-none font-black text-green-600" value="0.07"></div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-black mt-8 uppercase tracking-widest shadow-xl">Spremi</button>
            </div>
        </div>
    </div>

    <!-- MODAL DETALJI -->
    <div id="details-modal" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center p-6 text-center" onclick="closeModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-7 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 font-bold text-xl">✕</button>
            <h2 id="modal-date" class="font-black text-gray-400 uppercase text-xs mb-5 tracking-widest italic">DETALJI ZAPISA</h2>
            <div id="modal-content" class="space-y-4 text-sm font-bold text-gray-700"></div>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-8 uppercase text-[10px] tracking-widest">Zatvori</button>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around text-[9px] font-black text-gray-400 z-50">
        <button onclick="showTab('input')" id="btn-input" class="flex-1 py-5 active-tab uppercase text-blue-600">Unos</button>
        <button onclick="showTab('archive')" id="btn-archive" class="flex-1 py-5 uppercase">Arhiva</button>
        <button onclick="showTab('stats')" id="btn-stats" class="flex-1 py-5 uppercase">Statistika</button>
        <button onclick="showTab('settings')" id="btn-settings" class="flex-1 py-5 uppercase">Postavke</button>
    </nav>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('hr-HR', { weekday: 'long', day: 'numeric', month: 'long' });

        window.onload = () => {
            if(localStorage.getItem('p_vt')) {
                document.getElementById('p-vt').value = localStorage.getItem('p_vt');
                document.getElementById('p-nt').value = localStorage.getItem('p_nt');
                document.getElementById('p-out').value = localStorage.getItem('p_out');
            }
            liveCalc();
        };

        function showTab(tab) {
            ['input', 'archive', 'stats', 'settings'].forEach(t => {
                document.getElementById('tab-'+t).classList.add('hidden');
                document.getElementById('btn-'+t).classList.remove('active-tab', 'text-blue-600');
            });
            document.getElementById('tab-'+tab).classList.remove('hidden');
            document.getElementById('btn-'+tab).classList.add('active-tab', 'text-blue-600');
            const titles = { 'input': 'UNOS PODATAKA 📝', 'archive': 'ARHIVA UNOSA 📁', 'stats': 'STATISTIKA 📊', 'settings': 'POSTAVKE CIJENA ⚙️' };
            document.getElementById('header-title').innerText = titles[tab];
            if(tab === 'archive') renderArchive();
            if(tab === 'stats') renderStats();
        }

        function liveCalc() {
            const pvt = parseFloat(document.getElementById('p-vt').value) || 0;
            const pnt = parseFloat(document.getElementById('p-nt').value) || 0;
            const pout = parseFloat(document.getElementById('p-out').value) || 0;
            document.getElementById('eur-in-vt').innerText = ((parseFloat(document.getElementById('in-vt').value) || 0) * pvt).toFixed(2) + " €";
            document.getElementById('eur-in-nt').innerText = ((parseFloat(document.getElementById('in-nt').value) || 0) * pnt).toFixed(2) + " €";
            document.getElementById('eur-out-vt').innerText = ((parseFloat(document.getElementById('out-vt').value) || 0) * pout).toFixed(2) + " €";
            document.getElementById('eur-out-nt').innerText = ((parseFloat(document.getElementById('out-nt').value) || 0) * pout).toFixed(2) + " €";
        }

        function processData() {
            const v = {
                ivt: parseFloat(document.getElementById('in-vt').value) || 0,
                int: parseFloat(document.getElementById('in-nt').value) || 0,
                ovt: parseFloat(document.getElementById('out-vt').value) || 0,
                ont: parseFloat(document.getElementById('out-nt').value) || 0,
                sol: parseFloat(document.getElementById('sol-gen').value) || 0
            };
            const balance = (v.ivt * document.getElementById('p-vt').value + v.int * document.getElementById('p-nt').value) - ((v.ovt + v.ont) * document.getElementById('p-out').value);

            document.getElementById('chart-section').classList.remove('hidden');
            const vals = [v.ivt, v.int, v.ovt, v.ont, v.sol];
            const max = Math.max(...vals, 1);
            setTimeout(() => {
                vals.forEach((val, i) => document.getElementById(`bar-${i+1}`).style.height = (val / max * 100) + "%");
                const summ = document.getElementById('final-summary');
                summ.innerText = "Danas: " + balance.toFixed(2) + " €";
                summ.className = "text-center text-xl font-black italic mt-4 " + (balance > 0 ? "text-red-500" : "text-green-500");
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);

            let history = JSON.parse(localStorage.getItem('solar_history') || '[]');
            history.unshift({ 
                date: new Date().toLocaleDateString('hr-HR'), 
                val: balance.toFixed(2), 
                details: v,
                isoDate: new Date().toISOString()
            });
            localStorage.setItem('solar_history', JSON.stringify(history.slice(0, 1000)));
        }

        function renderArchive() {
            const history = JSON.parse(localStorage.getItem('solar_history') || '[]');
            const list = document.getElementById('history-list');
            if(!history.length) {
                list.innerHTML = '<p class="text-center text-gray-400 py-20 font-black italic uppercase text-xs text-center">Nema zapisa...</p>';
                return;
            }
            list.innerHTML = history.map((h, index) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-8 ${h.val > 0 ? 'border-red-500' : 'border-green-500'}">
                    <div class="flex items-center gap-4 text-left">
                        <input type="checkbox" class="del-check w-5 h-5 rounded-md border-gray-200" data-index="${index}" onchange="toggleDelBtn()">
                        <div onclick="showDetails(${index})" class="cursor-pointer">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">${h.date}</p>
                            <p class="text-[11px] font-bold text-gray-500 uppercase">Pojedinosti 🔍</p>
                        </div>
                    </div>
                    <span class="font-black text-lg ${h.val > 0 ? 'text-red-500' : 'text-green-500'} text-right">${h.val} €</span>
                </div>
            `).join('');
            toggleDelBtn();
        }

        function renderStats() {
            const history = JSON.parse(localStorage.getItem('solar_history') || '[]');
            const now = new Date();
            const monthNames = ["Siječanj", "Veljača", "Ožujak", "Travanj", "Svibanj", "Lipanj", "Srpanj", "Kolovoz", "Rujan", "Listopad", "Studeni", "Prosinac"];
            
            let logs = { month: { bal: 0, sol: 0, ivt: 0, int: 0, ovt: 0, ont: 0 }, 
                         year: { bal: 0, sol: 0, ivt: 0, int: 0, ovt: 0, ont: 0 }, 
                         all: { bal: 0, sol: 0, ivt: 0, int: 0, ovt: 0, ont: 0 } };
            let mLog = {};

            history.forEach(h => {
                const d = h.isoDate ? new Date(h.isoDate) : new Date();
                const v = parseFloat(h.val);
                const det = h.details || { ivt:0, int:0, ovt:0, ont:0, sol:0 };
                const mKey = `${monthNames[d.getMonth()]} ${d.getFullYear()}.`;

                const update = (obj) => {
                    obj.bal += v; obj.sol += det.sol;
                    obj.ivt += det.ivt; obj.int += det.int;
                    obj.ovt += det.ovt; obj.ont += det.ont;
                };

                update(logs.all);
                if(d.getFullYear() === now.getFullYear()) {
                    update(logs.year);
                    if(d.getMonth() === now.getMonth()) update(logs.month);
                }

                if(!mLog[mKey]) mLog[mKey] = { bal:0, sol:0, ivt:0, int:0, ovt:0, ont:0 };
                update(mLog[mKey]);
            });

            const card = (title, data, isMain = true) => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase italic mb-3 underline text-left">${title}</h3>
                    <div class="flex justify-between items-start mb-4">
                        <div class="text-left">
                            <p class="text-[9px] font-bold text-gray-400 uppercase">Saldo</p>
                            <p class="${isMain ? 'text-2xl' : 'text-xl'} font-black ${data.bal > 0 ? 'text-red-500' : 'text-green-500'}">${data.bal.toFixed(2)} €</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-gray-400 uppercase italic text-orange-500">Solar</p>
                            <p class="text-lg font-black text-orange-600">${data.sol.toFixed(1)} <span class="text-[10px]">kWh</span></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-3 border-t border-gray-50 text-[10px] font-bold">
                        <div class="text-left text-blue-600">
                            <p>1.8.1: ${data.ivt.toFixed(1)} kWh</p>
                            <p>1.8.2: ${data.int.toFixed(1)} kWh</p>
                        </div>
                        <div class="text-right text-green-600">
                            <p>2.8.1: ${data.ovt.toFixed(1)} kWh</p>
                            <p>2.8.2: ${data.ont.toFixed(1)} kWh</p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('stats-current').innerHTML = `
                ${card(`${monthNames[now.getMonth()]} ${now.getFullYear()}.`, logs.month)}
                ${card(`Godina ${now.getFullYear()}.`, logs.year)}
                ${card('Sveukupno razdoblje', logs.all)}
            `;

            document.getElementById('stats-history').innerHTML = Object.keys(mLog)
                .filter(m => m !== `${monthNames[now.getMonth()]} ${now.getFullYear()}.`)
                .map(m => card(m, mLog[m], false)).join('');
        }

        function showDetails(index) {
            const h = JSON.parse(localStorage.getItem('solar_history'))[index];
            if(!h.details) return alert("Zapis nema spremljene pojedinosti.");
            document.getElementById('modal-date').innerText = "ZAPIS: " + h.date;
            document.getElementById('modal-content').innerHTML = `
                <div class="flex justify-between border-b border-gray-100 pb-2"><span>Mreža VT (1.8.1)</span><span class="text-blue-600 font-black">${h.details.ivt} kWh</span></div>
                <div class="flex justify-between border-b border-gray-100 pb-2"><span>Mreža NT (1.8.2)</span><span class="text-blue-400 font-black">${h.details.int} kWh</span></div>
                <div class="flex justify-between border-b border-gray-100 pb-2"><span>Izvoz VT (2.8.1)</span><span class="text-green-700 font-black">${h.details.ovt} kWh</span></div>
                <div class="flex justify-between border-b border-gray-100 pb-2"><span>Izvoz NT (2.8.2)</span><span class="text-green-500 font-black">${h.details.ont} kWh</span></div>
                <div class="flex justify-between pt-2 font-black text-orange-600 uppercase"><span>SOLARNA PROIZVODNJA</span><span>${h.details.sol} kWh</span></div>
            `;
            document.getElementById('details-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('details-modal').classList.add('hidden'); }
        function toggleDelBtn() { document.getElementById('del-btn').classList.toggle('hidden', !document.querySelectorAll('.del-check:checked').length); }
        
        function deleteSelected() {
            if(!confirm("Obriši označene stavke?")) return;
            let history = JSON.parse(localStorage.getItem('solar_history'));
            Array.from(document.querySelectorAll('.del-check:checked')).map(cb => parseInt(cb.dataset.index)).sort((a,b)=>b-a).forEach(i => history.splice(i,1));
            localStorage.setItem('solar_history', JSON.stringify(history));
            renderArchive();
        }

        function exportData() {
            const blob = new Blob([localStorage.getItem('solar_history')], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Solar_Export_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                if(confirm("Učitati zapise? Briše trenutnu povijest!")) {
                    localStorage.setItem('solar_history', ev.target.result);
                    renderArchive();
                    alert("Podaci uvezeni!");
                }
            };
            reader.readAsText(e.target.files);
        }

        function saveSettings() {
            localStorage.setItem('p_vt', document.getElementById('p-vt').value);
            localStorage.setItem('p_nt', document.getElementById('p-nt').value);
            localStorage.setItem('p_out', document.getElementById('p-out').value);
            alert("Spremljeno! ✅");
            showTab('input');
        }
    </script>
</body>
</html>
